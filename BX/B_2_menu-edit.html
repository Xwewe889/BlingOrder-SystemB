<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🧪 B.測試菜單管理</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --p-purple: #9b87f5; --bg-purple: #f5f3ff; --dark-pink: #ff85a2; }
        body { font-family: sans-serif; background: #e5e7eb; padding: 20px; }
        .test-banner { background: #000; color: #ffeb3b; text-align: center; padding: 8px; font-weight: bold; margin-bottom: 20px; border-radius: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #666; margin-bottom: 30px; }
        .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr 2fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: #444; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 6px 0 #222; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #222; }
        .item-row { display: grid; grid-template-columns: 70px 1.5fr 1fr 1fr 2fr 220px; gap: 10px; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; align-items: center; border: 1px solid #eee; }
        .op-btn { border: none; padding: 10px 15px; border-radius: 8px; color: white; font-size: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 rgba(0,0,0,0.2); margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-banner">🧪 這是 B 系統 (測試資料庫：menu_v2_beta)</div>
        <div class="form-group">
            <h3 id="mode-text">新增測試餐點</h3>
            <div class="input-row">
                <input type="text" id="name" placeholder="名稱"><input type="number" id="price" placeholder="價格">
                <input type="text" id="cat" placeholder="類別"><input type="text" id="img" placeholder="圖片路徑">
            </div>
            <textarea id="note" rows="2" placeholder="測試用的介紹..."></textarea>
            <input type="hidden" id="edit-id">
            <button id="sub-btn" class="btn-main" onclick="handleSubmit()">上架到測試資料庫</button>
        </div>
        <div id="list-content"></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", authDomain: "blingorder.firebaseapp.com", projectId: "blingorder", databaseURL: "https://blingorder-default-rtdb.firebaseio.com", appId: "1:798993901664:web:9c2023b419ae099fe9fb05" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database(); let allM = {};

        function handleSubmit(){
            const id=document.getElementById('edit-id').value;
            const data={ 
                name:document.getElementById('name').value, 
                price:parseInt(document.getElementById('price').value), 
                category:document.getElementById('cat').value||'測試', 
                image:document.getElementById('img').value, 
                note:document.getElementById('note').value, 
                isSoldOut:id?allM[id].isSoldOut:false 
            };
            if(id) db.ref('menu_v2_beta/'+id).update(data).then(resetForm); else db.ref('menu_v2_beta').push(data).then(resetForm);
        }

        function resetForm(){ document.querySelectorAll('input,textarea').forEach(i=>i.value=''); document.getElementById('edit-id').value=''; }

        db.ref('menu_v2_beta').on('value', snap => {
            const list = document.getElementById('list-content'); list.innerHTML = '';
            allM = snap.val() || {};
            Object.keys(allM).forEach(id => {
                const i = allM[id]; const isSold = i.isSoldOut||false;
                list.innerHTML += `<div class="item-row">
                    <img src="${i.image}" style="width:55px; height:55px; object-fit:cover; border-radius:10px;" onerror="this.src='https://via.placeholder.com/55'">
                    <div><b>${i.name}</b></div><div style="color:#666;">${i.category}</div><div>$${i.price}</div>
                    <div style="font-size:12px; color:#aaa;">${i.note||''}</div>
                    <div style="text-align:right;">
                        <button class="op-btn" style="background:#4CAF50;" onclick="startEdit('${id}')">改</button>
                        <button class="op-btn" style="background:#ff5f6d;" onclick="db.ref('menu_v2_beta/${id}').remove()">刪</button>
                    </div></div>`;
            });
        });
        function startEdit(id){ const i=allM[id]; document.getElementById('edit-id').value=id; document.getElementById('name').value=i.name; document.getElementById('price').value=i.price; document.getElementById('cat').value=i.category; document.getElementById('img').value=i.image; document.getElementById('note').value=i.note; }
    </script>
</body>
</html>
