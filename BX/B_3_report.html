<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🧪 B.測試營收報表</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --p-purple: #9b87f5; --bg-purple: #f8f7ff; }
        body { font-family: sans-serif; background: #e5e7eb; padding: 20px; }
        .test-banner { background: #000; color: #ffeb3b; text-align: center; padding: 8px; font-weight: bold; margin-bottom: 20px; border-radius: 10px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f0f0f0; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .sum-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .sum-box { background: #f9f9f9; padding: 15px; border-radius: 10px; flex: 1; border: 1px solid #ddd; }
        .val { font-size: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="test-banner">🧪 B 系統測試對帳 (資料庫：orders_v2_beta)</div>
    <div class="card">
        <div class="sum-group">
            <div class="sum-box">測試實收營收<div class="val" id="day-real">$ 0</div></div>
            <div class="sum-box">測試招待總額<div class="val" id="day-free">$ 0</div></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>時間</th>
                    <th>桌號</th>
                    <th>金額</th>
                    <th>狀態</th>
                    <th>品項</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", authDomain: "blingorder.firebaseapp.com", projectId: "blingorder", databaseURL: "https://blingorder-default-rtdb.firebaseio.com", appId: "1:798993901664:web:9c2023b419ae099fe9fb05" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        db.ref('orders_v2_beta').on('value', snap => {
            const data = snap.val() || {};
            const tbody = document.getElementById('report-body');
            tbody.innerHTML = '';
            let tReal = 0, tFree = 0;
            const today = new Date().toLocaleDateString('zh-TW');

            Object.keys(data).reverse().forEach(key => {
                const o = data[key];
                const d = new Date(o.timestamp);
                const dStr = d.toLocaleDateString('zh-TW');
                const isFree = o.payStatus === "免單";
                const amount = parseInt(o.totalAmount || 0);

                if(dStr === today) {
                    if(isFree) tFree += amount; else tReal += amount;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</td>
                        <td>${o.tableId}</td>
                        <td>$${amount}</td>
                        <td>${o.payStatus}</td>
                        <td style="font-size:12px; color:#666;">${o.items.map(i=>i.name).join('、')}</td>
                        <td>
                            <button style="background:#ff5f6d; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer;" onclick="db.ref('orders_v2_beta/${key}').remove()">刪除</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('day-real').innerText = '$ ' + tReal.toLocaleString();
            document.getElementById('day-free').innerText = '$ ' + tFree.toLocaleString();
        });
    </script>
</body>
</html>
