<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 昭和復古測試點餐 | BlingOrder</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --retro-gold: #d4af37;
            --retro-wood: #5d3a1a;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            /* 路徑修正：回上一層找 images */
            background-image: url('../images/retro/retro_pattern_bg.png');
            background-repeat: repeat;
            margin: 0;
            padding-bottom: 120px;
            color: #3d2b1f;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            background-image: url('../images/retro/retro_banner.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: none; }

        .table-info {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            color: var(--retro-wood);
            text-align: center;
            border-bottom: 2px solid var(--retro-gold);
        }

        .category-container {
            margin: 30px 15px 15px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .category-container::after {
            content: "";
            position: absolute;
            left: 0; right: 0; top: 50%;
            height: 40px;
            transform: translateY(-50%);
            background-image: url('../images/retro/retro_wood_divider.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            z-index: 1;
        }

        .category-badge {
            position: relative;
            z-index: 2;
            display: inline-flex;
            height: 50px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        .cat-left { width: 30px; background: url('../images/retro/category_left.png') no-repeat; background-size: 100% 100%; }
        .cat-mid { 
            background: url('../images/retro/category_mid.png') repeat-x; background-size: auto 100%; 
            padding: 0 15px; display: flex; align-items: center;
            color: #3d2b1f; font-weight: bold; font-size: 20px; letter-spacing: 2px;
        }
        .cat-right { width: 30px; background: url('../images/retro/category_right.png') no-repeat; background-size: 100% 100%; }

        .menu-container {
            padding: 0 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item-card {
            background: #fdfaf1;
            border: 15px solid transparent;
            border-image: url('../images/retro/retro_frame.png') 40 stretch;
            padding: 5px;
            position: relative;
            transition: 0.2s;
            text-align: center;
        }
        .item-card:active { transform: translateY(3px); }

        .item-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 1px solid #d4af37;
        }

        .item-info h3 { margin: 8px 0 4px; font-size: 15px; color: #3d2b1f; height: 40px; overflow: hidden; }
        .price { font-family: "Georgia", serif; color: #a52a2a; font-weight: bold; font-size: 18px; }

        .add-btn-img {
            width: 100px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s;
        }
        .add-btn-img:active { transform: rotate(15deg) scale(0.9); }

        /* 複古捲動條路徑修正 */
        ::-webkit-scrollbar { width: 30px; }
        ::-webkit-scrollbar-track {
            background-image: url('../images/retro/retro_track_top.png'), 
                              url('../images/retro/retro_track_bottom.png'), 
                              url('../images/retro/retro_track_mid.png');
            background-position: top, bottom, center;
            background-repeat: no-repeat, no-repeat, repeat-y;
        }
        ::-webkit-scrollbar-thumb {
            background: url('../images/retro/retro_scroll_handle.png') no-repeat center;
            background-size: 25px;
        }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content {
            background: #fdfaf1;
            border: 25px solid transparent;
            border-image: url('../images/retro/retro_modal.png') 80 stretch;
            width: 85%;
            max-width: 400px;
            animation: fadeIn 0.3s forwards;
            position: relative;
        }

        .cart-footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 90px;
            background: url('../images/retro/retro_submit_order.png') no-repeat center;
            background-size: contain;
            z-index: 900;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }
        #cart-status { color: #fdfaf1; font-size: 12px; margin-top: -5px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div class="header"></div>
    <div class="table-info" id="display-table">載入中...</div>
    <div id="menu-list"></div>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <img id="m-img" style="width:100%; border-bottom:2px solid var(--retro-gold);" src="">
            <div style="padding:15px; text-align:center;">
                <h2 id="m-name" style="margin:0;"></h2>
                <p id="m-note" style="font-size:14px; margin:10px 0; color: #555;"></p>
                <div id="m-price" style="font-size:24px; color:#a52a2a; font-weight:bold;"></div>
                <img src="../images/retro/retro_button.png" class="add-btn-img" onclick="addFromModal()">
                <div onclick="closeModal()" style="margin-top:15px; color:#888; font-size:13px; text-decoration:underline; cursor:pointer;">返回菜單</div>
            </div>
        </div>
    </div>

    <div class="cart-footer" onclick="submitOrder()">
        <div id="cart-status">尚未挑選測試餐點</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
            authDomain: "blingorder.firebaseapp.com", 
            projectId: "blingorder", 
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || '外帶';
        document.getElementById('display-table').innerText = `📍 復古測試席：${tableId}`;

        let cart = []; 
        let tempItem = null;

        db.ref('menu_v2_beta').on('value', snap => {
            const list = document.getElementById('menu-list'); 
            list.innerHTML = ''; 
            const data = snap.val() || {};
            const grouped = {}; 
            
            Object.values(data).forEach(i => {
                if(!grouped[i.category]) grouped[i.category] = [];
                grouped[i.category].push(i);
            });

            Object.keys(grouped).forEach(cat => {
                list.innerHTML += `
                    <div class="category-container">
                        <div class="category-badge">
                            <div class="cat-left"></div>
                            <div class="cat-mid">${cat}</div>
                            <div class="cat-right"></div>
                        </div>
                    </div>`;
                
                let itemsHtml = '<div class="menu-container">';
                grouped[cat].forEach(item => {
                    const isSoldOut = item.isSoldOut === true;
                    itemsHtml += `
                        <div class="item-card ${isSoldOut ? 'sold-out' : ''}" onclick="openModal('${item.name}', '${item.price}', '${item.note || ''}', '${item.image || ''}', '${item.category}')">
                            <img class="item-img" src="${item.image || 'https://via.placeholder.com/150'}">
                            <div class="item-info">
                                <h3>${item.name}</h3>
                                <div class="price">$${item.price}</div>
                                <img src="../images/retro/retro_button.png" class="add-btn-img">
                            </div>
                        </div>`;
                });
                itemsHtml += '</div>';
                list.innerHTML += itemsHtml;
            });
        });

        function openModal(n, p, nt, img, cat) {
            tempItem = { name:n, price:parseInt(p), category:cat };
            document.getElementById('m-name').innerText = n;
            document.getElementById('m-price').innerText = '$ ' + p;
            document.getElementById('m-note').innerText = nt || "昭和風味推薦。";
            document.getElementById('m-img').src = img || 'https://via.placeholder.com/300';
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        function addFromModal() {
            cart.push(tempItem);
            document.getElementById('cart-status').innerText = `已挑選 ${cart.length} 項測試餐點`;
            closeModal();
        }

        function submitOrder() {
            if(!cart.length) return alert('請先選購餐點喔！');
            db.ref('orders_v2_beta').push({
                tableId: tableId,
                items: cart,
                totalAmount: cart.reduce((s, i) => s + i.price, 0),
                timestamp: Date.now(),
                payStatus: "尚未結帳"
            }).then(() => {
                alert('🧪 昭和測試單已送出！');
                cart = [];
                document.getElementById('cart-status').innerText = '尚未挑選測試餐點';
            });
        }
    </script>
</body>
</html>
