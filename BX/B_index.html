<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 測試點餐 | BlingOrder</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --bg-gray: #f3f4f6; --test-dark: #333; }
        body { font-family: "PingFang TC", sans-serif; background-color: var(--bg-gray); margin: 0; padding-bottom: 120px; }
        
        .test-banner { background: var(--test-dark); color: #ffeb3b; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; position: sticky; top: 0; z-index: 2000; }
        
        .header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--primary-pink); }
        .header h1 { margin: 0; font-size: 22px; color: var(--test-dark); }
        .table-info { background: #fff; padding: 5px; font-weight: bold; color: var(--primary-pink); border-bottom: 1px solid #eee; text-align: center; }

        .category-nav { display: flex; overflow-x: auto; background: white; padding: 10px; position: sticky; top: 27px; z-index: 1000; gap: 8px; border-bottom: 1px solid #eee; }
        .cat-btn { white-space: nowrap; padding: 6px 15px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 14px; }
        .cat-btn.active { background: var(--primary-pink); color: white; border-color: var(--primary-pink); }

        .menu-container { padding: 15px; display: grid; gap: 12px; }
        .item-card { background: white; border-radius: 15px; padding: 10px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-card.sold-out { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .item-card.sold-out::after { content: "售完"; position: absolute; right: 20px; background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .item-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 12px; }
        .item-info { flex: 1; position: relative; }
        .item-info h3 { margin: 0; font-size: 16px; color: #333; }
        .item-price { color: var(--primary-pink); font-weight: bold; font-size: 16px; margin-top: 4px; }

        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--test-dark); color: white; padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1500; cursor: pointer; }
    </style>
</head>
<body>

    <div class="test-banner">🧪 實驗 B 系統 - 測試數據不計入營收</div>

    <div class="header">
        <h1>BlingOrder 🧪</h1>
    </div>

    <div class="table-info" id="display-table">載入桌號中...</div>

    <div class="category-nav" id="cat-nav">
        <button class="cat-btn active" onclick="filterCat('全部')">全部</button>
    </div>

    <div class="menu-container" id="menu-list"></div>

    <div class="cart-bar" onclick="submitOrder()">
        <span id="cart-count">🛒 已選 0 項</span>
        <span id="cart-total">送出測試單 $0 ></span>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
            authDomain: "blingorder.firebaseapp.com", 
            projectId: "blingorder", 
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 1. 桌號偵測邏輯 ---
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || '外帶';
        document.getElementById('display-table').innerText = `📍 當前位置：${tableId === '外帶' ? '外帶' : tableId + ' 號桌'}`;

        let cart = [];
        let allItems = [];
        const catOrder = ["飲品", "炸物", "昭和小食", "甜點"];

        // 載入菜單
        db.ref('menu_v2_beta').on('value', snap => {
            const data = snap.val() || {};
            allItems = Object.values(data);
            renderCategories();
            renderMenu('全部');
        });

        function renderCategories() {
            const uniqueCats = [...new Set(allItems.map(i => i.category))];
            // 依照自定義順序排序
            const sortedCats = uniqueCats.sort((a, b) => {
                let idxA = catOrder.indexOf(a) === -1 ? 99 : catOrder.indexOf(a);
                let idxB = catOrder.indexOf(b) === -1 ? 99 : catOrder.indexOf(b);
                return idxA - idxB;
            });
            
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = '<button class="cat-btn active" onclick="filterCat(\'全部\', this)">全部</button>';
            sortedCats.forEach(c => {
                nav.innerHTML += `<button class="cat-btn" onclick="filterCat('${c}', this)">${c}</button>`;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(cat);
        }

        function renderMenu(cat) {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            const filtered = allItems.filter(i => cat === '全部' || i.category === cat);
            
            filtered.forEach(item => {
                const isSold = item.isSoldOut === true;
                list.innerHTML += `
                    <div class="item-card ${isSold ? 'sold-out' : ''}" onclick="addToCart('${item.name}', ${item.price})">
                        <img src="${item.image}" class="item-img" onerror="this.src='https://via.placeholder.com/70'">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <div class="item-price">$${item.price}</div>
                        </div>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('cart-count').innerText = `🛒 已選 ${cart.length} 項`;
            document.getElementById('cart-total').innerText = `送出測試單 $${total} >`;
        }

        function submitOrder() {
            if (cart.length === 0) return alert('尚未選擇餐點喔！');
            
            const orderData = {
                tableId: tableId,
                items: cart,
                totalAmount: cart.reduce((sum, i) => sum + i.price, 0),
                timestamp: Date.now(),
                payStatus: "尚未結帳"
            };

            db.ref('orders_v2_beta').push(orderData).then(() => {
                alert(`🧪 測試訂單已送出！\n桌號：${tableId}`);
                cart = [];
                updateCartUI();
            });
        }
    </script>
</body>
</html>
