<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 昭和復古測試點餐 | BlingOrder</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --retro-gold: #d4af37; --retro-wood: #5d3a1a; }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-image: url('../images/retro/retro_pattern_bg.png');
            background-repeat: repeat;
            margin: 0; padding-bottom: 150px; color: #3d2b1f;
        }

        /* 1. 招牌 Banner：滿格 */
        .header-banner {
            width: 100%; height: 160px;
            background: url('../images/retro/retro_banner.png') no-repeat top center;
            background-size: 100% auto;
            z-index: 1;
        }

        /* 2. 分類吧：往上移，介於 Banner 與壁紙中間 */
        .category-container {
            margin: -20px 0 40px; /* 這裡的負值會讓它往上吃進 Banner 區域 */
            display: flex; justify-content: center; align-items: center;
            position: relative; height: 100px; z-index: 10;
        }

        /* 木頭橫桿 */
        .category-container::after {
            content: ""; position: absolute; left: 0; right: 0; top: 50%;
            height: 48px; transform: translateY(-50%);
            background: url('../images/retro/retro_wood_divider.png') repeat-x center;
            background-size: auto 100%; z-index: 1;
        }

        /* 電話：加大並加重陰影 */
        .deco-phone {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 90px; /* 加大尺寸 */
            z-index: 5; filter: drop-shadow(5px 8px 12px rgba(0,0,0,0.7));
        }

        /* 打字機：加大並加重陰影 */
        .deco-typewriter {
            position: absolute; right: 10px; top: 50%; transform: translateY(-55%);
            width: 90px; /* 加大尺寸 */
            z-index: 5; filter: drop-shadow(5px 8px 12px rgba(0,0,0,0.7));
        }

        /* 昭和樂園牌子：強制縮短 */
        .category-badge {
            position: relative; z-index: 6; display: inline-flex; height: 60px;
            filter: drop-shadow(8px 10px 15px rgba(0,0,0,0.6));
            min-width: 160px; /* 給一個基礎寬度 */
        }
        .cat-left { width: 35px; background: url('../images/retro/category_left.png') no-repeat; background-size: 100% 100%; }
        .cat-mid { 
            background: url('../images/retro/category_mid.png') repeat-x; background-size: auto 100%; 
            padding: 0 10px; display: flex; align-items: center; justify-content: center;
            color: #3d2b1f; font-weight: bold; font-size: 20px; letter-spacing: 1px;
            white-space: nowrap;
        }
        .cat-right { width: 35px; background: url('../images/retro/category_right.png') no-repeat; background-size: 100% 100%; }

        /* 菜單網格 */
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px;
            position: relative; z-index: 10;
        }

        .item-card {
            background: #fdfaf1; border: 18px solid transparent;
            border-image: url('../images/retro/retro_frame.png') 45 stretch;
            padding: 0; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .item-img { width: 90%; aspect-ratio: 1/1; object-fit: cover; margin-top: 5px; border: 1px solid #d4af37; }
        .item-info { padding: 10px 5px; text-align: center; width: 100%; }
        .item-info h3 { margin: 5px 0; font-size: 15px; color: #3d2b1f; height: 40px; display: flex; align-items: center; justify-content: center; }
        .price { font-family: "Georgia", serif; color: #a52a2a; font-weight: bold; font-size: 18px; }
        .add-btn-icon { width: 65px; cursor: pointer; transition: 0.2s; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3)); }

        /* 捲動條 */
        ::-webkit-scrollbar { width: 28px; }
        ::-webkit-scrollbar-track {
            background-image: url('../images/retro/retro_track_top.png'), url('../images/retro/retro_track_bottom.png'), url('../images/retro/retro_track_mid.png');
            background-position: top center, bottom center, center;
            background-repeat: no-repeat, no-repeat, repeat-y; background-size: 100% auto;
        }
        ::-webkit-scrollbar-thumb { background: url('../images/retro/retro_scroll_handle.png') no-repeat center; background-size: 22px; }

        /* 底部固定 */
        .footer-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; display: flex; justify-content: center; align-items: center; z-index: 900; pointer-events: none; }
        .cart-footer { pointer-events: auto; width: 320px; height: 80px; background: url('../images/retro/retro_submit_order.png') no-repeat center; background-size: contain; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #cart-status { color: #fff; font-size: 13px; margin-top: -8px; font-weight: bold; text-shadow: 1px 1px 3px #000; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header-banner"></div>

    <div id="menu-list"></div>

    <div id="detail-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:#fdfaf1; border:22px solid transparent; border-image:url('../images/retro/retro_modal.png') 80 stretch; width:85%; max-width:380px;">
            <img id="m-img" style="width:100%; height:200px; object-fit:cover; border-bottom:2px solid var(--retro-gold);" src="">
            <div style="padding:20px; text-align:center;">
                <h2 id="m-name" style="margin:0; font-size:24px;"></h2>
                <p id="m-note" style="font-size:15px; margin:15px 0; color:#5d3a1a;"></p>
                <div id="m-price" style="font-size:28px; color:#a52a2a; font-weight:bold; margin-bottom:10px;"></div>
                <img src="../images/retro/retro_button.png" class="add-btn-icon" style="width:120px;" onclick="addFromModal()">
                <div onclick="closeModal()" style="margin-top:20px; color:#888; font-size:14px; text-decoration:underline; cursor:pointer;">返回菜單</div>
            </div>
        </div>
    </div>

    <div class="footer-container">
        <div class="cart-footer" onclick="submitOrder()">
            <div id="cart-status">尚未挑選測試餐點</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
            authDomain: "blingorder.firebaseapp.com", 
            projectId: "blingorder", 
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = []; 
        let tempItem = null;

        db.ref('menu_v2_beta').on('value', snap => {
            const list = document.getElementById('menu-list'); 
            list.innerHTML = ''; 
            const data = snap.val() || {};
            const grouped = {}; 
            Object.values(data).forEach(i => {
                if(!grouped[i.category]) grouped[i.category] = [];
                grouped[i.category].push(i);
            });

            Object.keys(grouped).forEach(cat => {
                list.innerHTML += `
                    <div class="category-container">
                        <img src="../images/retro/retro_phone.png" class="deco-phone">
                        <div class="category-badge">
                            <div class="cat-left"></div>
                            <div class="cat-mid">${cat}</div>
                            <div class="cat-right"></div>
                        </div>
                        <img src="../images/retro/retro_typewriter.png" class="deco-typewriter">
                    </div>`;
                
                let itemsHtml = '<div class="menu-grid">';
                grouped[cat].forEach(item => {
                    itemsHtml += `
                        <div class="item-card" onclick="openModal('${item.name}', '${item.price}', '${item.note || ''}', '${item.image || ''}', '${item.category}')">
                            <img class="item-img" src="${item.image || 'https://via.placeholder.com/150'}">
                            <div class="item-info">
                                <h3>${item.name}</h3>
                                <div class="price">$${item.price}</div>
                                <img src="../images/retro/retro_button.png" class="add-btn-icon">
                            </div>
                        </div>`;
                });
                itemsHtml += '</div>';
                list.innerHTML += itemsHtml;
            });
        });

        function openModal(n, p, nt, img, cat) {
            tempItem = { name:n, price:parseInt(p), category:cat };
            document.getElementById('m-name').innerText = n;
            document.getElementById('m-price').innerText = '$ ' + p;
            document.getElementById('m-note').innerText = nt || "昭和風味推薦。";
            document.getElementById('m-img').src = img || 'https://via.placeholder.com/300';
            document.getElementById('detail-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        function addFromModal() { cart.push(tempItem); document.getElementById('cart-status').innerText = `🛒 已選 ${cart.length} 項`; closeModal(); }
        function submitOrder() {
            if(!cart.length) return alert('請先選購餐點喔！');
            db.ref('orders_v2_beta').push({ items: cart, totalAmount: cart.reduce((s, i) => s + i.price, 0), timestamp: Date.now() }).then(() => {
                alert('🧪 昭和測試單已送出！');
                cart = []; document.getElementById('cart-status').innerText = '尚未挑選測試餐點';
            });
        }
    </script>
</body>
</html>
