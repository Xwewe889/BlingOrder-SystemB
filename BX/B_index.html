<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧪 昭和復古測試點餐 | BlingOrder</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --retro-gold: #d4af37;
            --retro-wood: #5d3a1a;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-image: url('../images/retro/retro_pattern_bg.png');
            background-repeat: repeat;
            margin: 0;
            padding-bottom: 150px;
            color: #3d2b1f;
            -webkit-tap-highlight-color: transparent;
            /* 讓內容可以蓋過招牌 */
            display: flex;
            flex-direction: column;
        }

        /* 1. 招牌 Banner：設為底層滿格 */
        .header-banner {
            width: 100%;
            height: 180px; /* 根據招牌比例調整高度 */
            background-image: url('../images/retro/retro_banner.png');
            background-size: 100% auto; /* 橫向滿格 */
            background-repeat: no-repeat;
            background-position: top center;
            position: relative;
            z-index: 1; /* 最底層 */
            margin-bottom: -30px; /* 讓下面的內容稍微往上吃掉一點招牌邊緣，更自然 */
        }

        /* 2. 桌號資訊：開始蓋在招牌上方 */
        .table-info {
            position: relative;
            z-index: 10; /* 高於招牌 */
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            color: var(--retro-wood);
            text-align: center;
            border-top: 3px double var(--retro-gold);
            border-bottom: 3px double var(--retro-gold);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }

        /* 內容容器：確保在招牌上方 */
        .main-content {
            position: relative;
            z-index: 10;
        }

        /* 分類容器與橫桿 */
        .category-container {
            margin: 40px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 60px;
        }

        .category-container::after {
            content: "";
            position: absolute;
            left: 0; right: 0; top: 50%;
            height: 36px;
            transform: translateY(-50%);
            background-image: url('../images/retro/retro_wood_divider.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            z-index: 1;
        }

        .category-badge {
            position: relative;
            z-index: 2;
            display: inline-flex;
            height: 54px;
            filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.4));
        }
        .cat-left { width: 35px; background: url('../images/retro/category_left.png') no-repeat; background-size: 100% 100%; }
        .cat-mid { 
            background: url('../images/retro/category_mid.png') repeat-x; background-size: auto 100%; 
            padding: 0 20px; display: flex; align-items: center;
            color: #3d2b1f; font-weight: bold; font-size: 22px; letter-spacing: 3px;
        }
        .cat-right { width: 35px; background: url('../images/retro/category_right.png') no-repeat; background-size: 100% 100%; }

        /* 菜單雙欄佈局 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 12px;
        }

        .item-card {
            background: #fdfaf1;
            border: 18px solid transparent;
            border-image: url('../images/retro/retro_frame.png') 45 stretch;
            padding: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .item-img {
            width: 90%;
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-top: 5px;
            border: 1px solid #d4af37;
        }

        .item-info { padding: 10px 5px; text-align: center; width: 100%; }
        .item-info h3 { margin: 5px 0; font-size: 16px; color: #3d2b1f; height: 45px; display: flex; align-items: center; justify-content: center; }
        .price { font-family: "Georgia", serif; color: #a52a2a; font-weight: bold; font-size: 20px; }

        .add-btn-icon {
            width: 65px;
            cursor: pointer;
            transition: 0.2s;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
        }
        .add-btn-icon:active { transform: scale(0.9) rotate(15deg); }

        /* 捲動條 */
        ::-webkit-scrollbar { width: 28px; }
        ::-webkit-scrollbar-track {
            background-image: url('../images/retro/retro_track_top.png'), 
                              url('../images/retro/retro_track_bottom.png'), 
                              url('../images/retro/retro_track_mid.png');
            background-position: top center, bottom center, center;
            background-repeat: no-repeat, no-repeat, repeat-y;
            background-size: 100% auto;
        }
        ::-webkit-scrollbar-thumb {
            background: url('../images/retro/retro_scroll_handle.png') no-repeat center;
            background-size: 22px;
        }

        /* 底部固定按鈕 */
        .footer-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 110px; display: flex; justify-content: center; align-items: center;
            z-index: 900; pointer-events: none;
        }

        .cart-footer {
            pointer-events: auto;
            width: 320px; height: 80px;
            background: url('../images/retro/retro_submit_order.png') no-repeat center;
            background-size: contain;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
            cursor: pointer;
        }
        
        #cart-status { 
            color: #fff; font-size: 13px; margin-top: -8px; font-weight: bold; 
            text-shadow: 1px 1px 3px #000; background: rgba(0,0,0,0.3);
            padding: 2px 10px; border-radius: 10px;
        }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; }
        .modal-content {
            background: #fdfaf1;
            border: 22px solid transparent;
            border-image: url('../images/retro/retro_modal.png') 80 stretch;
            width: 85%; max-width: 380px;
        }
    </style>
</head>
<body>
    <div class="header-banner"></div>

    <div class="main-content">
        <div class="table-info" id="display-table">📍 讀取中...</div>
        <div id="menu-list"></div>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <img id="m-img" style="width:100%; height: 200px; object-fit: cover; border-bottom:2px solid var(--retro-gold);" src="">
            <div style="padding:20px; text-align:center;">
                <h2 id="m-name" style="margin:0; font-size: 24px;"></h2>
                <p id="m-note" style="font-size:15px; margin:15px 0; color: #5d3a1a;"></p>
                <div id="m-price" style="font-size:28px; color:#a52a2a; font-weight:bold; margin-bottom: 10px;"></div>
                <img src="../images/retro/retro_button.png" class="add-btn-icon" style="width: 120px;" onclick="addFromModal()">
                <div onclick="closeModal()" style="margin-top:20px; color:#888; font-size:14px; text-decoration:underline; cursor:pointer;">返回菜單</div>
            </div>
        </div>
    </div>

    <div class="footer-container">
        <div class="cart-footer" onclick="submitOrder()">
            <div id="cart-status">尚未挑選測試餐點</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
            authDomain: "blingorder.firebaseapp.com", 
            projectId: "blingorder", 
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || '外帶';
        document.getElementById('display-table').innerText = `📍 復古測試席：${tableId}`;

        let cart = []; 
        let tempItem = null;

        db.ref('menu_v2_beta').on('value', snap => {
            const list = document.getElementById('menu-list'); 
            list.innerHTML = ''; 
            const data = snap.val() || {};
            const grouped = {}; 
            
            Object.values(data).forEach(i => {
                if(!grouped[i.category]) grouped[i.category] = [];
                grouped[i.category].push(i);
            });

            Object.keys(grouped).forEach(cat => {
                list.innerHTML += `
                    <div class="category-container">
                        <div class="category-badge">
                            <div class="cat-left"></div>
                            <div class="cat-mid">${cat}</div>
                            <div class="cat-right"></div>
                        </div>
                    </div>`;
                
                let itemsHtml = '<div class="menu-grid">';
                grouped[cat].forEach(item => {
                    const isSoldOut = item.isSoldOut === true;
                    itemsHtml += `
                        <div class="item-card ${isSoldOut ? 'sold-out' : ''}" onclick="openModal('${item.name}', '${item.price}', '${item.note || ''}', '${item.image || ''}', '${item.category}')">
                            <img class="item-img" src="${item.image || 'https://via.placeholder.com/150'}">
                            <div class="item-info">
                                <h3>${item.name}</h3>
                                <div class="price">$${item.price}</div>
                                <img src="../images/retro/retro_button.png" class="add-btn-icon">
                            </div>
                        </div>`;
                });
                itemsHtml += '</div>';
                list.innerHTML += itemsHtml;
            });
        });

        function openModal(n, p, nt, img, cat) {
            tempItem = { name:n, price:parseInt(p), category:cat };
            document.getElementById('m-name').innerText = n;
            document.getElementById('m-price').innerText = '$ ' + p;
            document.getElementById('m-note').innerText = nt || "昭和風味推薦。";
            document.getElementById('m-img').src = img || 'https://via.placeholder.com/300';
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        function addFromModal() {
            cart.push(tempItem);
            document.getElementById('cart-status').innerText = `🛒 已選 ${cart.length} 項`;
            closeModal();
        }

        function submitOrder() {
            if(!cart.length) return alert('請先選購餐點喔！');
            db.ref('orders_v2_beta').push({
                tableId: tableId,
                items: cart,
                totalAmount: cart.reduce((s, i) => s + i.price, 0),
                timestamp: Date.now(),
                payStatus: "尚未結帳"
            }).then(() => {
                alert('🧪 昭和測試單已送出！');
                cart = [];
                document.getElementById('cart-status').innerText = '尚未挑選測試餐點';
            });
        }
    </script>
</body>
</html>
