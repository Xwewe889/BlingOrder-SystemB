<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🧪 B.測試歷史補錄</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5e7eb; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #333; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#333; text-align:center;">📜 🧪 B.測試歷史補錄</h2>
        <p style="font-size:12px; color:#666; text-align:center;">此處數據僅會進入 v2_beta 測試區</p>
        <label>日期</label><input type="date" id="date">
        <label>總金額</label><input type="number" id="amt" placeholder="測試總額">
        <label>品項簡述</label><input type="text" id="note" placeholder="例如：測試大餐">
        <button onclick="save()">確認補錄進測試資料庫</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", authDomain: "blingorder.firebaseapp.com", projectId: "blingorder", databaseURL: "https://blingorder-default-rtdb.firebaseio.com", appId: "1:798993901664:web:9c2023b419ae099fe9fb05" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        function save(){
            const d=document.getElementById('date').value; const a=parseInt(document.getElementById('amt').value); const n=document.getElementById('note').value;
            if(!d || !a) return alert('必填！');
            db.ref('orders_v2_beta').push({ tableId:"B-測試", totalAmount:a, timestamp:new Date(d).getTime(), payStatus:"已結帳", items:[{name:n||"測試項", price:a, category:"測試"}], isHistory:true }).then(()=>alert('測試數據補錄成功！'));
        }
    </script>
</body>
</html>
