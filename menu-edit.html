<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 菜單進階管理</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 15px; }
        .form-group { background: #fff5f7; padding: 15px; border-radius: 12px; border: 1px solid #fce7f3; margin-bottom: 15px; }
        .row1 { display: grid; grid-template-columns: 2fr 1fr 0.5fr 0.5fr 1.5fr; gap: 10px; margin-bottom: 10px; }
        .row2 { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 10px; border-radius: 5px; font-size: 13px; color: #db2777; }
        .row2 label { display: flex; align-items: center; cursor: pointer; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn-save { background: #059669; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100px; }
        .btn-add { background: #db2777; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💎 菜單進階管理 (含自訂選項)</h2>
        <button class="btn-add" onclick="addNewItem()">＋ 新增品項</button>
        <div id="menuList"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://blingorder-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const options = ["冰", "去冰", "熱", "無糖", "加糖", "五辛素", "蛋奶素", "輕微醺", "深微醺"];

        function loadMenu() {
            db.ref('menu').on('value', (snapshot) => {
                const list = document.getElementById('menuList');
                list.innerHTML = '';
                snapshot.forEach((child) => {
                    const item = child.val();
                    const id = child.key;
                    let optsHtml = options.map(opt => `
                        <label><input type="checkbox" id="opt-${opt}-${id}" ${item.opts && item.opts[opt] ? 'checked' : ''}> ${opt}</label>
                    `).join('');

                    list.innerHTML += `
                        <div class="form-group">
                            <div class="row1">
                                <div><label>完整名稱</label><input type="text" id="name-${id}" value="${item.name || ''}"></div>
                                <div><label>簡稱</label><input type="text" id="short-${id}" value="${item.short_name || ''}"></div>
                                <div><label>類別</label><input type="text" id="cat-${id}" value="${item.category || '飲料'}"></div>
                                <div><label>金額</label><input type="number" id="price-${id}" value="${item.price || 0}"></div>
                                <div><label>圖片網址</label><input type="text" id="img-${id}" value="${item.image || ''}"></div>
                            </div>
                            <div class="row2">
                                <strong>顯示選項：</strong> ${optsHtml}
                            </div>
                            <div style="margin-top:10px; text-align:right;">
                                <button class="btn-save" onclick="saveItem('${id}')">儲存</button>
                                <button style="background:#dc2626; color:white; border:none; padding:10px; border-radius:5px;" onclick="deleteItem('${id}')">刪除</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function saveItem(id) {
            let selectedOpts = {};
            options.forEach(opt => {
                selectedOpts[opt] = document.getElementById(`opt-${opt}-${id}`).checked;
            });

            const data = {
                name: document.getElementById(`name-${id}`).value,
                short_name: document.getElementById(`short-${id}`).value,
                category: document.getElementById(`cat-${id}`).value,
                price: parseInt(document.getElementById(`price-${id}`).value),
                image: document.getElementById(`img-${id}`).value,
                opts: selectedOpts
            };
            db.ref('menu/' + id).update(data).then(() => alert('儲存成功！'));
        }

        function addNewItem() {
            db.ref('menu').push({ name: "新餐點", category: "飲料", price: 0 });
        }
        function deleteItem(id) { if(confirm('刪除？')) db.ref('menu/' + id).remove(); }
        loadMenu();
    </script>
</body>
</html>
