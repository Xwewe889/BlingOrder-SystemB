<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 菜單管理 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff85a2; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🟣 菜單管理 V2 (含備註)</h2>
        <input type="text" id="name" placeholder="餐點名稱">
        <input type="number" id="price" placeholder="價格">
        <textarea id="note" placeholder="餐點詳細介紹 (會顯示在詳情彈窗)"></textarea>
        <button onclick="addItem()">上架餐點</button>
        <div id="list" style="margin-top:20px;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addItem() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const note = document.getElementById('note').value;
            if(!name || !price) return alert('必填');
            db.ref('menu_v2').push({ name, price: parseInt(price), note });
            document.getElementById('name').value=''; document.getElementById('price').value=''; document.getElementById('note').value='';
        }

        db.ref('menu_v2').on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = '<h3>目前菜單</h3>';
            snap.forEach(child => {
                list.innerHTML += `<div class="item"><span>${child.val().name} ($${child.val().price})</span> <a href="#" onclick="db.ref('menu_v2/${child.key}').remove()" style="color:red;">刪除</a></div>`;
            });
        });
    </script>
</body>
</html>
