<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 菜單進階管理 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { background: #fff5f7; padding: 20px; border-radius: 12px; border: 1px solid #fce7f3; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr 2fr; gap: 10px; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff85a2; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #9b87f5; width: 100%; margin-top: 10px; }
        .item-list { margin-top: 20px; }
        .item-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 3fr 1fr; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; align-items: center; font-size: 13px; }
        .header-row { font-weight: bold; background: #f8f7ff; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#ff85a2; text-align:center;">🟣 V2 菜單管理系統</h2>
        
        <div class="form-group">
            <h3>新增餐點</h3>
            <div class="row">
                <input type="text" id="name" placeholder="餐點名稱">
                <input type="number" id="price" placeholder="價格">
                <select id="category">
                    <option value="飲品">飲品</option>
                    <option value="炸物">炸物</option>
                    <option value="昭和小食">昭和小食</option>
                    <option value="甜點">甜點</option>
                </select>
                <input type="text" id="image" placeholder="圖片路徑 (例如: images/tea.jpg)">
            </div>
            <textarea id="note" placeholder="餐點備註/詳情介紹"></textarea>
            <button class="btn-add" onclick="addItem()">正式上架到 V2 菜單庫</button>
        </div>

        <div class="item-list" id="item-list">
            <div class="item-row header-row">
                <div>圖片</div><div>名稱</div><div>類別</div><div>價格</div><div>備註</div><div>操作</div>
            </div>
            <div id="list-content"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addItem() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const category = document.getElementById('category').value;
            const image = document.getElementById('image').value;
            const note = document.getElementById('note').value;

            if(!name || !price) return alert('請輸入名稱與價格');

            db.ref('menu_v2').push({
                name, price: parseInt(price), category, image, note
            }).then(() => {
                alert('上架成功！');
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('image').value = '';
                document.getElementById('note').value = '';
            });
        }

        db.ref('menu_v2').on('value', snap => {
            const content = document.getElementById('list-content');
            content.innerHTML = '';
            snap.forEach(child => {
                const item = child.val();
                content.innerHTML += `
                    <div class="item-row">
                        <div><img src="${item.image}" style="width:30px; height:30px; object-fit:cover; border-radius:4px;" onerror="this.src='https://via.placeholder.com/30'"></div>
                        <div><b>${item.name}</b></div>
                        <div>${item.category}</div>
                        <div>$${item.price}</div>
                        <div style="color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.note || ''}</div>
                        <div><button onclick="db.ref('menu_v2/${child.key}').remove()" style="background:#ff5f6d; padding:5px 10px; font-size:11px;">刪除</button></div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
