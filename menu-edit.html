<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 菜單完整管理版</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #db2777; border-bottom: 2px solid #fbcfe8; padding-bottom: 10px; }
        .form-group { display: grid; grid-template-columns: 1.5fr 1fr 0.6fr 0.6fr 1fr 1fr 100px; gap: 10px; margin-bottom: 15px; background: #fff5f7; padding: 15px; border-radius: 8px; border: 1px solid #fce7f3; align-items: end; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn-add { background: #db2777; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .btn-save { background: #059669; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .btn-del { background: #dc2626; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; }
        label { font-size: 12px; color: #db2777; font-weight: bold; margin-bottom: 5px; display: block; }
        .header-label { font-weight: bold; color: #db2777; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💎 菜單完整管理 (含圖片與簡稱)</h2>
        <button class="btn-add" onclick="addNewItem()">＋ 新增品項</button>
        
        <div id="menuList"></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadMenu() {
            db.ref('menu').on('value', (snapshot) => {
                const menuList = document.getElementById('menuList');
                menuList.innerHTML = '';
                snapshot.forEach((child) => {
                    const item = child.val();
                    const id = child.key;
                    menuList.innerHTML += `
                        <div class="form-group">
                            <div><label>品項完整名稱</label><input type="text" id="name-${id}" value="${item.name || ''}"></div>
                            <div><label>後台簡稱</label><input type="text" id="short-${id}" value="${item.short_name || ''}"></div>
                            <div><label>類別(A/B)</label><input type="text" id="cat-${id}" value="${item.category || 'A'}"></div>
                            <div><label>金額</label><input type="number" id="price-${id}" value="${item.price || 0}"></div>
                            <div><label>圖片路徑</label><input type="text" id="img-${id}" value="${item.image || ''}"></div>
                            <div><label>備註/描述</label><input type="text" id="note-${id}" value="${item.note || ''}"></div>
                            <div>
                                <button class="btn-save" onclick="saveItem('${id}')">儲存</button>
                                <button class="btn-del" onclick="deleteItem('${id}')">刪除</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function addNewItem() {
            const newRef = db.ref('menu').push();
            newRef.set({ name: "新餐點", short_name: "簡稱", category: "A", price: 0, image: "img/default.jpg", note: "" });
        }

        function saveItem(id) {
            const updateData = {
                name: document.getElementById(`name-${id}`).value,
                short_name: document.getElementById(`short-${id}`).value,
                category: document.getElementById(`cat-${id}`).value.toUpperCase(),
                price: parseInt(document.getElementById(`price-${id}`).value),
                image: document.getElementById(`img-${id}`).value,
                note: document.getElementById(`note-${id}`).value
            };
            db.ref('menu/' + id).update(updateData).then(() => alert('儲存成功！'));
        }

        function deleteItem(id) {
            if(confirm('確定要刪除嗎？')) db.ref('menu/' + id).remove();
        }

        loadMenu();
    </script>
</body>
</html>
