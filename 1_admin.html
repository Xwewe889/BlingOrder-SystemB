<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 1.接單看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .order-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 25px; border-left: 10px solid #ff85a2; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-no { font-size: 32px; font-weight: bold; color: #ff85a2; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .cat-tag { font-size: 11px; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; margin-right: 5px; color: #888; }
        .btn-pay { background: #4CAF50; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #3e8e41; transition: 0.1s; }
        .btn-free { background: #9b87f5; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-left: 12px; box-shadow: 0 5px 0 #7b6ac5; }
        .btn-pay:active, .btn-free:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h2 style="color:#ff85a2; text-align:center;">🌸 1.現場接單中心 (V2)</h2>
    <div id="order-list"></div>
    <script>
        // Firebase 配置
        const firebaseConfig = { 
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
            authDomain: "blingorder.firebaseapp.com", 
            projectId: "blingorder", 
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
        };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database();

        // 分類排序權重
        const catOrder = { "飲品":1, "炸物":2, "昭和小食":3, "甜點":4 };

        // 監聽訂單 (路徑: orders_v2)
        db.ref('orders_v2').on('value', snap => {
            const list = document.getElementById('order-list'); 
            list.innerHTML = '';
            
            snap.forEach(child => {
                const o = child.val(); 
                // 僅顯示尚未結帳的訂單
                if(o.payStatus === "尚未結帳") {
                    // 依照分類排序餐點
                    const sortedItems = [...(o.items||[])].sort((a,b) => (catOrder[a.category]||99) - (catOrder[b.category]||99));
                    
                    list.innerHTML += `
                        <div class="order-card">
                            <div class="table-no">桌號：${o.tableId || '外帶'}</div>
                            <div>
                                ${sortedItems.map(i => `
                                    <div class="item-row">
                                        <span><span class="cat-tag">${i.category || '一般'}</span><b>${i.name}</b></span>
                                        <span>x ${i.count || 1}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="text-align:right; margin-top:20px;">
                                <button class="btn-pay" onclick="updatePay('${child.key}','已結帳')">現金結帳 $${o.totalAmount || 0}</button>
                                <button class="btn-free" onclick="updatePay('${child.key}','免單')">✨ 招待免單</button>
                            </div>
                        </div>`;
                }
            });
        });

        // 更新付款狀態
        function updatePay(k, s) { 
            if(confirm(`確定標記為 ${s} 嗎？`)) {
                db.ref('orders_v2/'+k).update({ payStatus: s }); 
            }
        }
    </script>
</body>
</html>
