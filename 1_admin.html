<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder 管理後台</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2d3436; color: white; padding: 20px; }
        .order-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .order-card { background: #353b48; border-radius: 15px; padding: 18px; border-left: 10px solid #ff7675; }
        .order-card.paid { border-left-color: #fdcb6e; }
        .item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #444; }
        .total-price { color: #ffe66d; font-size: 24px; font-weight: bold; text-align: right; margin-top: 15px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .pay-btn { background: #55efc4; }
        .serve-btn { background: #0984e3; color: white; grid-column: span 2; }
        .free-btn { background: #a29bfe; }
    </style>
</head>
<body>

<div id="voiceBtn" style="background:#e17055; padding:15px; text-align:center; border-radius:10px; cursor:pointer; margin-bottom:20px; font-weight:bold;">🔊 點此開啟語音通知功能</div>
<div class="order-container" id="orderList"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
        authDomain: "blingorder.firebaseapp.com", 
        projectId: "blingorder", 
        databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
        storageBucket: "blingorder.firebasestorage.app", 
        appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let voiceOn = false;
    document.getElementById('voiceBtn').onclick = function() {
        voiceOn = true;
        this.innerText = "語音系統運行中...";
        this.style.background = "#55efc4";
        speak("語音啟動");
    };

    function speak(t) { if(voiceOn) { const m = new SpeechSynthesisUtterance(t); m.lang='zh-TW'; window.speechSynthesis.speak(m); } }

    database.ref('orders').on('value', (snapshot) => {
        const list = document.getElementById('orderList');
        const data = snapshot.val();
        
        // 新訂單聲音
        const currentCount = document.querySelectorAll('.order-card').length;
        if(data && Object.keys(data).length > currentCount) speak("您有新訂單");

        list.innerHTML = "";
        if(!data) return;

        Object.keys(data).reverse().forEach(key => {
            const o = data[key];
            if(o.status === "已出餐") return;

            const isPaid = (o.status === "已結帳" || o.status === "招待免單");
            let itemsHtml = "";
            if(o.items) {
                o.items.forEach(i => {
                    itemsHtml += `<div class="item-row"><span>${i.name} x${i.count}</span><span>$${i.price}</span></div>`;
                });
            }

            list.innerHTML += `
                <div class="order-card ${isPaid ? 'paid' : ''}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b style="font-size:18px;">桌號：${o.table}</b>
                        <span style="background:#444; padding:2px 8px; border-radius:5px; font-size:12px;">${o.status}</span>
                    </div>
                    ${itemsHtml}
                    <div class="total-price">$${o.total}</div>
                    <div class="btn-group">
                        ${!isPaid ? `
                            <button class="pay-btn" onclick="update('${key}','已結帳')">結帳</button>
                            <button class="free-btn" onclick="free('${key}')">招待</button>
                        ` : `
                            <button class="serve-btn" onclick="update('${key}','已出餐')">完成出餐 (結案)</button>
                        `}
                    </div>
                </div>`;
        });
    });

    function update(k, s) { database.ref('orders/'+k).update({status:s}); }
    function free(k) { if(confirm("招待免單？")) database.ref('orders/'+k).update({status:"招待免單", total:0}); }
</script>
</body>
</html>
