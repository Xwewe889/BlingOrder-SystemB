<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder - 訂單管理 V2 (修復版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2d3436; color: white; padding: 20px; }
        h1 { display: flex; align-items: center; gap: 10px; color: #fab1a0; }
        .order-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .order-card { background: #353b48; border-radius: 15px; padding: 18px; border-left: 10px solid #ff7675; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .order-card.paid { border-left-color: #fdcb6e; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #57606f; padding-bottom: 12px; margin-bottom: 12px; }
        .table-num { font-size: 20px; font-weight: bold; color: #74b9ff; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 5px; }
        .total-area { text-align: right; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #57606f; }
        .total-price { color: #ffe66d; font-size: 22px; font-weight: bold; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .pay-btn { background: #55efc4; color: #2d3436; }
        .serve-btn { background: #0984e3; color: white; grid-column: span 2; }
        .free-btn { background: #a29bfe; color: #2d3436; }
        .status-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #ff7675; font-weight: bold; }
        .status-tag.paid-tag { background: #fdcb6e; color: #333; }
    </style>
</head>
<body>

<h1>🔔 BlingOrder 實時訂單監控</h1>
<div id="authNotice" style="background: #e17055; padding: 15px; margin-bottom: 20px; border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold;">
    👉 為了啟用「語音通知」，請先點擊我一下 👈
</div>

<div class="order-container" id="orderList">
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
        authDomain: "blingorder.firebaseapp.com", 
        projectId: "blingorder", 
        databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
        storageBucket: "blingorder.firebasestorage.app", 
        appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let voiceEnabled = false;
    document.getElementById('authNotice').onclick = function() {
        speak("語音系統已啟動");
        this.style.display = 'none';
        voiceEnabled = true;
    };

    function speak(text) {
        if (!window.speechSynthesis) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    // 監聽訂單
    database.ref('orders').on('value', (snapshot) => {
        const list = document.getElementById('orderList');
        const data = snapshot.val();
        
        // 語音提醒邏輯
        const currentCount = document.querySelectorAll('.order-card').length;
        if(data && Object.keys(data).length > currentCount && voiceEnabled) {
            speak("有新訂單進來囉！");
        }

        list.innerHTML = "";
        if(!data) {
            list.innerHTML = "<p>目前沒有新訂單</p>";
            return;
        }

        Object.keys(data).reverse().forEach(key => {
            const order = data[key];
            if(order.status === "已出餐") return;

            const isPaid = (order.status === "已結帳" || order.status === "招待免單");
            
            // 關鍵修復：處理 V2 的餐點資料結構
            let itemsHtml = "";
            if (order.items && Array.isArray(order.items)) {
                order.items.forEach(item => {
                    // 使用 item.name 或 item.itemName (增加相容性)
                    const name = item.name || item.itemName || "未知餐點";
                    const price = item.price || 0;
                    const count = item.count || 1;
                    itemsHtml += `<div class="item-row"><span>${name} x${count}</span><span>$${price * count}</span></div>`;
                });
            }

            const html = `
                <div class="order-card ${isPaid ? 'paid' : ''}">
                    <div class="order-header">
                        <span class="table-num">桌號：${order.table || '外帶'}</span>
                        <span class="status-tag ${isPaid ? 'paid-tag' : ''}">${order.status || '待處理'}</span>
                    </div>
                    <div class="items-area">${itemsHtml}</div>
                    <div class="total-area">
                        <span style="font-size:14px; color:#aaa;">總金額</span><br>
                        <span class="total-price">$${order.total || 0}</span>
                    </div>
                    <div class="btn-group">
                        ${!isPaid ? `
                            <button class="pay-btn" onclick="updateStatus('${key}', '已結帳')">💰 已結帳</button>
                            <button class="free-btn" onclick="handleFree('${key}')">🎁 招待免單</button>
                        ` : `
                            <button class="serve-btn" onclick="updateStatus('${key}', '已出餐')">✅ 已出餐 (結案)</button>
                        `}
                    </div>
                </div>
            `;
            list.innerHTML += html;
        });
    });

    function updateStatus(key, newStatus) {
        database.ref('orders/' + key).update({ status: newStatus });
    }

    function handleFree(key) {
        if(confirm("確定要這單免費招待嗎？")) {
            database.ref('orders/' + key).update({ status: "招待免單", total: 0 });
        }
    }
</script>
</body>
</html>
