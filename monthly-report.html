<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 股東月結報告中心</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-purple: #9b87f5; --bg-purple: #f5f3ff; --dark-pink: #ff85a2; }
        body { font-family: sans-serif; background: var(--bg-purple); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .report-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .kpi-box { background: #fdfbff; padding: 20px; border-radius: 15px; border: 1px solid #e0d7ff; text-align: center; }
        .kpi-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .kpi-val { font-size: 22px; font-weight: bold; color: var(--p-purple); }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        select { padding: 10px; border-radius: 10px; border: 1px solid var(--p-purple); font-weight: bold; }
        @media print { .no-print { display: none; } } /* 支援列印成 PDF */
    </style>
</head>
<body>
    <div class="container">
        <div class="report-card">
            <div class="header-flex">
                <div>
                    <h2 style="margin:0; color:var(--p-purple);">📊 股東月結經營報告 (V2)</h2>
                    <p style="color:#aaa; margin:5px 0 0;">BlingOrder · 布拎布拎喫茶店</p>
                </div>
                <div class="no-print">
                    <select id="month-select" onchange="generateReport()">
                        </select>
                    <button onclick="window.print()" style="margin-left:10px; padding:10px; border-radius:10px; background:var(--dark-pink); color:white; border:none; cursor:pointer;">匯出報表</button>
                </div>
            </div>

            <div class="kpi-grid">
                <div class="kpi-box"><div class="kpi-label">該月總營業額</div><div class="kpi-val" id="m-total">$ 0</div></div>
                <div class="kpi-box"><div class="kpi-label">實際現金收入</div><div class="kpi-val" id="m-cash" style="color:var(--dark-pink);">$ 0</div></div>
                <div class="kpi-box"><div class="kpi-label">招待/免單總額</div><div class="kpi-val" id="m-free">$ 0</div></div>
                <div class="kpi-box"><div class="kpi-label">總訂單數</div><div class="kpi-val" id="m-count">0</div></div>
            </div>

            <div class="chart-grid">
                <div>
                    <h4 style="color:#666; text-align:center;">🍰 品項營收貢獻度</h4>
                    <canvas id="pieChart"></canvas>
                </div>
                <div>
                    <h4 style="color:#666; text-align:center;">📅 每週營收表現</h4>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div style="margin-top:40px; padding:20px; background:#f9f9f9; border-radius:10px;">
                <h4 style="margin:0 0 10px; color:#444;">💡 經營摘要</h4>
                <p id="summary-text" style="color:#666; font-size:14px; line-height:1.6;"></p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let pieChart, barChart;

        // 初始化月份選單 (最近 6 個月)
        const select = document.getElementById('month-select');
        for(let i=0; i<6; i++) {
            const d = new Date(); d.setMonth(d.getMonth() - i);
            const val = `${d.getFullYear()}-${d.getMonth() + 1}`;
            select.innerHTML += `<option value="${val}">${d.getFullYear()}年 ${d.getMonth()+1}月</option>`;
        }

        function generateReport() {
            const [year, month] = document.getElementById('month-select').value.split('-').map(Number);
            
            db.ref('orders_v2').once('value', snap => {
                const data = snap.val() || {};
                let mTotal = 0, mCash = 0, mFree = 0, mCount = 0;
                let itemSales = {}, weeklyData = [0, 0, 0, 0, 0]; // 5週

                Object.values(data).forEach(o => {
                    const d = new Date(o.timestamp);
                    if(d.getFullYear() === year && (d.getMonth() + 1) === month) {
                        const amount = parseInt(o.totalAmount || 0);
                        mCount++;
                        mTotal += amount;
                        if(o.payStatus === '免單') mFree += amount; else mCash += amount;

                        // 品項分析
                        if(o.items) o.items.forEach(i => { itemSales[i.name] = (itemSales[i.name] || 0) + (i.price || 0); });

                        // 週分析 (簡單計算第幾週)
                        const week = Math.floor((d.getDate() - 1) / 7);
                        if(week < 5) weeklyData[week] += (o.payStatus === '免單' ? 0 : amount);
                    }
                });

                // 更新數據
                document.getElementById('m-total').innerText = '$ ' + mTotal.toLocaleString();
                document.getElementById('m-cash').innerText = '$ ' + mCash.toLocaleString();
                document.getElementById('m-free').innerText = '$ ' + mFree.toLocaleString();
                document.getElementById('m-count').innerText = mCount;
                
                // 自動生成摘要
                document.getElementById('summary-text').innerText = `${month}月份共完成 ${mCount} 筆交易，實收營收為 $${mCash.toLocaleString()}。招待金額佔總營收約 ${((mFree/mTotal)*100 || 0).toFixed(1)}%。`;

                updateCharts(itemSales, weeklyData);
            });
        }

        function updateCharts(items, weeks) {
            // 圓餅圖
            const sortedItems = Object.entries(items).sort((a,b)=>b[1]-a[1]).slice(0,5);
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if(pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: sortedItems.map(i=>i[0]),
                    datasets: [{ data: sortedItems.map(i=>i[1]), backgroundColor: ['#9b87f5','#ff85a2','#ffc107','#4caf50','#2196f3'] }]
                }
            });

            // 長條圖
            const ctxBar = document.getElementById('barChart').getContext('2d');
            if(barChart) barChart.destroy();
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['第一週', '第二週', '第三週', '第四週', '第五週'],
                    datasets: [{ label: '週營收', data: weeks, backgroundColor: '#9b87f5' }]
                }
            });
        }

        generateReport(); // 首次載入
    </script>
</body>
</html>
