<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 數據分析中心</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #ffafbd; --secondary-pink: #ffc3a0; --dark-pink: #e91e63; --bg-light: #fff5f7; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-light); margin: 0; padding: 20px; color: #555; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--dark-pink); font-size: 2.5rem; margin-bottom: 10px; }
        .last-update { font-size: 0.9rem; color: #999; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(255,175,189,0.2); text-align: center; border-bottom: 5px solid var(--primary-pink); }
        .stat-card h3 { margin: 0; font-size: 1rem; color: #888; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: var(--dark-pink); margin: 10px 0; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
        .chart-title { font-weight: bold; color: var(--dark-pink); margin-bottom: 15px; }
        .ranking-list { list-style: none; padding: 0; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .history-list { list-style: none; padding: 0; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💎 BlingOrder 營運數據分析</h1>
            <div class="last-update" id="update-time">最後更新：載入中...</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>📅 本日營收 (<span id="t-date">--/--</span>)</h3><div class="value" id="today-revenue">$0</div></div>
            <div class="stat-card"><h3>📅 昨日營收 (<span id="y-date">--/--</span>)</h3><div class="value" id="yesterday-revenue">$0</div></div>
            <div class="stat-card"><h3>📊 本月累計</h3><div class="value" id="month-revenue">$0</div></div>
            <div class="stat-card"><h3>📈 歷史總營收</h3><div class="value" id="total-revenue">$0</div></div>
        </div>

        <div class="charts-grid">
            <div class="chart-container"><div class="chart-title">🍎 熱銷品項佔比</div><canvas id="pieChart"></canvas></div>
            <div class="chart-container"><div class="chart-title">🏆 銷售排行榜</div><ul class="ranking-list" id="ranking-list"></ul></div>
        </div>

        <div class="chart-container">
            <div class="chart-title">🗓️ 每日營收日誌</div>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function updateDashboard() {
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW');
            const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString('zh-TW');
            document.getElementById('t-date').innerText = (now.getMonth()+1) + '/' + now.getDate();
            document.getElementById('y-date').innerText = (yesterday.getMonth()+1) + '/' + yesterday.getDate();

            db.ref('orders').once('value', (snapshot) => {
                const orders = snapshot.val() || {};
                let todayRev = 0, yesterdayRev = 0, monthRev = 0, totalRev = 0;
                let itemCounts = {}, dailyRev = {};

                Object.values(orders).forEach(order => {
                    const amount = parseInt(order.totalAmount || order.totalPrice || order.total_price || 0);
                    const d = new Date(order.timestamp || Date.now());
                    const dateStr = d.toLocaleDateString('zh-TW');
                    
                    totalRev += amount;
                    if (dateStr === todayStr) todayRev += amount;
                    if (dateStr === yesterdayStr) yesterdayRev += amount;
                    if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthRev += amount;

                    dailyRev[dateStr] = (dailyRev[dateStr] || 0) + amount;

                    if (order.items && Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            const name = item.name || item.itemName || "未知";
                            itemCounts[name] = (itemCounts[name] || 0) + (item.quantity || item.count || 1);
                        });
                    }
                });

                document.getElementById('today-revenue').innerText = '$' + todayRev.toLocaleString();
                document.getElementById('yesterday-revenue').innerText = '$' + yesterdayRev.toLocaleString();
                document.getElementById('month-revenue').innerText = '$' + monthRev.toLocaleString();
                document.getElementById('total-revenue').innerText = '$' + totalRev.toLocaleString();
                
                // 更新排行榜與歷史日誌
                const sortedItems = Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]);
                document.getElementById('ranking-list').innerHTML = sortedItems.slice(0,10).map((i,idx)=>
                    `<li class="ranking-item"><span>${idx+1}. ${i[0]}</span><span>${i[1]} 份</span></li>`).join('');

                const sortedHistory = Object.entries(dailyRev).sort((a,b)=>new Date(b[0])-new Date(a[0]));
                document.getElementById('history-list').innerHTML = sortedHistory.slice(0,7).map(h=>
                    `<li class="history-item"><span>${h[0]}</span><span style="color:var(--dark-pink);font-weight:bold">$${h[1].toLocaleString()}</span></li>`).join('');

                updateChart(sortedItems);
                document.getElementById('update-time').innerText = `最後更新：${new Date().toLocaleString()}`;
            });
        }

        let chart;
        function updateChart(sortedItems) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: sortedItems.slice(0, 8).map(i => i[0]),
                    datasets: [{
                        data: sortedItems.slice(0, 8).map(i => i[1]),
                        backgroundColor: ['#ffafbd', '#ffc3a0', '#ff9a9e', '#fad0c4', '#a1c4fd', '#c2e9fb', '#fbc2eb', '#a6c1ee']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
