<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 數據分析中心 (標準換日版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --soft-pink: #fff0f3; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #fffafb; margin: 0; padding: 25px; color: #444; }
        .header { text-align: center; margin-bottom: 35px; }
        .title { color: var(--primary-pink); font-size: 32px; font-weight: bold; letter-spacing: 3px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 8px 20px rgba(255,133,162,0.1); border: 1px solid var(--soft-pink); }
        .stat-val { font-size: 28px; font-weight: 800; color: var(--primary-pink); margin: 10px 0; }
        .stat-label { color: #888; font-size: 14px; font-weight: bold; }
        .content-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 25px; }
        .panel { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid var(--soft-pink); margin-bottom: 25px; }
        .panel-title { font-size: 20px; font-weight: bold; color: var(--primary-pink); margin-bottom: 20px; border-left: 5px solid var(--primary-pink); padding-left: 12px; }
        .daily-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dotted #ffccd5; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #fff5f7; }
        @media (max-width: 768px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="title">💎 BlingOrder 營運數據分析</div>
    <p id="sync-time" style="color:#bbb; font-weight: bold; margin-top: 10px;">數據同步中...</p>
</div>

<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-label">📅 本日營收 (今日 00:00 起)</div>
        <div class="stat-val" id="today-rev">$0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">📅 本周累計</div>
        <div class="stat-val" id="week-rev">$0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">📅 本月累計</div>
        <div class="stat-val" id="month-rev">$0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">📈 歷史總營收</div>
        <div class="stat-val" id="total-rev">$0</div>
    </div>
</div>

<div class="content-grid">
    <div class="left-col">
        <div class="panel">
            <div class="panel-title">🥧 熱銷品項佔比</div>
            <div style="height: 400px; position: relative;">
                <canvas id="pieChart"></canvas>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">🗓️ 每日營收日誌</div>
            <div id="daily-log"></div>
        </div>
    </div>
    <div class="right-col">
        <div class="panel">
            <div class="panel-title">🏆 銷售排行榜</div>
            <div id="rank-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://blingorder-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let pieChart = null;

    db.ref('orders').on('value', snap => {
        let todaySum = 0, weekSum = 0, monthSum = 0, totalSum = 0;
        let itemSales = {};
        let dailyTotals = {}; 

        const now = new Date();
        const todayStr = now.toLocaleDateString('zh-TW'); // 標準今日日期
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const sevenDaysAgoMs = Date.now() - (7 * 24 * 60 * 60 * 1000);

        snap.forEach(child => {
            const o = child.val();
            // 確保金額轉為數字
            const amt = Number(o.totalPrice || o.total || 0);
            totalSum += amt;

            // 處理時間戳記
            const orderTimestamp = Number(o.timestamp || 0);
            if (!orderTimestamp) return;

            const orderDateObj = new Date(orderTimestamp);
            const orderDateStr = orderDateObj.toLocaleDateString('zh-TW');

            // 1. 每日日誌 (依據標準日期)
            dailyTotals[orderDateStr] = (dailyTotals[orderDateStr] || 0) + amt;

            // 2. 本日營收 (與電腦當前日期完全一致)
            if (orderDateStr === todayStr) {
                todaySum += amt;
            }

            // 3. 本周累計 (7天內)
            if (orderTimestamp >= sevenDaysAgoMs) {
                weekSum += amt;
            }

            // 4. 本月累計
            if (orderDateObj.getMonth() === currentMonth && orderDateObj.getFullYear() === currentYear) {
                monthSum += amt;
            }

            // 5. 品項排行 (解決 [object Object] 並合併相同名稱)
            if (Array.isArray(o.items)) {
                o.items.forEach(item => {
                    const itemName = (typeof item === 'object') ? (item.name || "未知") : item;
                    // 統計時去掉括號，例如 "咖啡(去冰)" 跟 "咖啡(熱)" 都算在 "咖啡"
                    const pureName = itemName.split('(')[0];
                    itemSales[pureName] = (itemSales[pureName] || 0) + 1;
                });
            }
        });

        // 渲染數據
        document.getElementById('today-rev').innerText = `$${todaySum.toLocaleString()}`;
        document.getElementById('week-rev').innerText = `$${weekSum.toLocaleString()}`;
        document.getElementById('month-rev').innerText = `$${monthSum.toLocaleString()}`;
        document.getElementById('total-rev').innerText = `$${totalSum.toLocaleString()}`;
        document.getElementById('sync-time').innerText = `最後同步時間：${new Date().toLocaleString()}`;

        updateVisuals(itemSales, dailyTotals);
    });

    function updateVisuals(itemData, dailyData) {
        // 日誌更新
        const dailyLog = document.getElementById('daily-log');
        dailyLog.innerHTML = "";
        const sortedDates = Object.keys(dailyData).sort((a, b) => new Date(b) - new Date(a));
        sortedDates.forEach(date => {
            if (date === "Invalid Date") return;
            dailyLog.innerHTML += `
                <div class="daily-item">
                    <span style="font-weight:bold">${date}</span>
                    <span style="color:var(--primary-pink); font-weight:800">$${dailyData[date].toLocaleString()}</span>
                </div>`;
        });

        // 排行榜更新
        const sortedItems = Object.entries(itemData).sort((a,b) => b[1] - a[1]);
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        sortedItems.slice(0, 15).forEach(([name, qty], index) => {
            list.innerHTML += `<div class="rank-item"><span>${index+1}. ${name}</span><span style="color:#aaa">${qty} 份</span></div>`;
        });

        // 圓餅圖更新
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: sortedItems.slice(0, 10).map(x => x[0]),
                datasets: [{
                    data: sortedItems.slice(0, 10).map(x => x[1]),
                    backgroundColor: ['#ff85a2', '#ffb3c1', '#ffc2d1', '#ffdee5', '#fb6f92', '#ff8fab', '#c8e6c9', '#b3e5fc', '#d1c4e9', '#f0f4f8']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
