<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 數據分析中心</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f7; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .value { font-size: 1.5rem; font-weight: bold; color: #e91e63; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">今日營收<div class="value" id="t-rev">$0</div></div>
        <div class="card">昨日營收<div class="value" id="y-rev">$0</div></div>
        <div class="card">本月累計<div class="value" id="m-rev">$0</div></div>
        <div class="card">歷史總額<div class="value" id="all-rev">$0</div></div>
    </div>
    <div class="chart-grid">
        <div class="chart-card"><h3>熱銷排行</h3><div id="rank"></div></div>
        <div class="chart-card"><h3>營收日誌</h3><div id="logs"></div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function refresh() {
            db.ref('orders').once('value', snapshot => {
                const data = snapshot.val() || {};
                const now = new Date();
                const today = now.toLocaleDateString('zh-TW');
                const yesterday = new Date(); yesterday.setDate(now.getDate()-1);
                const yesterdayStr = yesterday.toLocaleDateString('zh-TW');

                let t = 0, y = 0, m = 0, total = 0;
                let items = {}, daily = {};

                Object.values(data).forEach(order => {
                    const amount = parseInt(order.totalAmount || 0); // 只讀取新版欄位，避免抓到舊資料
                    const d = new Date(order.timestamp || 0);
                    const dStr = d.toLocaleDateString('zh-TW');

                    total += amount;
                    if(dStr === today) t += amount;
                    if(dStr === yesterdayStr) y += amount;
                    if(d.getMonth() === now.getMonth()) m += amount;

                    if(amount > 0) daily[dStr] = (daily[dStr] || 0) + amount;

                    if(Array.isArray(order.items)) {
                        order.items.forEach(i => {
                            if(i.name) items[i.name] = (items[i.name] || 0) + (i.quantity || 1);
                        });
                    }
                });

                document.getElementById('t-rev').innerText = '$' + t;
                document.getElementById('y-rev').innerText = '$' + y;
                document.getElementById('m-rev').innerText = '$' + m;
                document.getElementById('all-rev').innerText = '$' + total;

                // 顯示日誌
                const sortedLogs = Object.entries(daily).sort((a,b) => new Date(b[0]) - new Date(a[0]));
                document.getElementById('logs').innerHTML = sortedLogs.map(l => `<div>${l[0]} : $${l[1]}</div>`).join('');
                
                // 顯示排行
                const sortedRank = Object.entries(items).sort((a,b) => b[1] - a[1]);
                document.getElementById('rank').innerHTML = sortedRank.slice(0,10).map(i => `<div>${i[0]} : ${i[1]}份</div>`).join('');
            });
        }
        refresh();
    </script>
</body>
</html>
