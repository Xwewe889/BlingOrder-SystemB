<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 數據分析 (日期校正版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --soft-pink: #fff0f3; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fffafb; padding: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(255,133,162,0.1); border: 1px solid var(--soft-pink); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--primary-pink); }
        .panel { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--soft-pink); }
    </style>
</head>
<body>
<h2 style="text-align:center; color: var(--primary-pink);">💎 BlingOrder 營收校正看板</h2>
<div class="stat-grid">
    <div class="stat-card"><div>本日營收 (3/27)</div><div class="stat-val" id="today-rev">$0</div></div>
    <div class="stat-card"><div>昨日營收 (3/26)</div><div class="stat-val" id="yesterday-rev">$0</div></div>
    <div class="stat-card"><div>本月累計</div><div class="stat-val" id="month-rev">$0</div></div>
    <div class="stat-card"><div>歷史總營收</div><div class="stat-val" id="total-rev">$0</div></div>
</div>
<div class="panel">
    <h3>🗓️ 每日營收對帳單</h3>
    <div id="daily-log"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://blingorder-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getStandardDate(ts) {
        const d = new Date(ts);
        // 強制使用 YYYY/MM/DD 格式進行比對，避免時區進位錯誤
        return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    }

    db.ref('orders').on('value', snap => {
        let todaySum = 0, yesterdaySum = 0, monthSum = 0, totalSum = 0;
        let dailyTotals = {};

        const now = new Date();
        const todayStr = getStandardDate(now.getTime());
        const yesterdayStr = getStandardDate(now.getTime() - 86400000);

        snap.forEach(child => {
            const o = child.val();
            const amt = Number(o.totalPrice || o.total || 0);
            const ts = Number(o.timestamp || parseInt(child.key));
            if (isNaN(ts) || amt === 0) return;

            const dateStr = getStandardDate(ts);
            
            totalSum += amt;
            dailyTotals[dateStr] = (dailyTotals[dateStr] || 0) + amt;

            if (dateStr === todayStr) todaySum += amt;
            if (dateStr === yesterdayStr) yesterdaySum += amt;
            if (new Date(ts).getMonth() === now.getMonth()) monthSum += amt;
        });

        document.getElementById('today-rev').innerText = `$${todaySum.toLocaleString()}`;
        document.getElementById('yesterday-rev').innerText = `$${yesterdaySum.toLocaleString()}`;
        document.getElementById('month-rev').innerText = `$${monthSum.toLocaleString()}`;
        document.getElementById('total-rev').innerText = `$${totalSum.toLocaleString()}`;

        const log = document.getElementById('daily-log');
        log.innerHTML = Object.keys(dailyTotals).sort((a,b)=>new Date(b)-new Date(a))
            .map(d => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>${d}</span><b>$${dailyTotals[d].toLocaleString()}</b></div>`).join('');
    });
</script>
</body>
</html>
