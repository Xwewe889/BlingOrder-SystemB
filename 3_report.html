<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 3.營收報表</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: "PingFang TC", sans-serif; background: #f8f7ff; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #9b87f5; border-left: 5px solid #9b87f5; padding-left: 15px; margin-bottom: 25px; }
        .sum-box { background: #f0ecff; padding: 20px; border-radius: 12px; display: inline-block; margin-right: 15px; margin-bottom: 20px; }
        .sum-label { font-size: 14px; color: #666; font-weight: bold; }
        .sum-value { font-size: 28px; font-weight: 800; color: #9b87f5; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #9b87f5; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .tag-free { color: #4CAF50; font-weight: bold; }
        .tag-paid { color: #9b87f5; font-weight: bold; }
        .date-selector { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .date-selector input, .date-selector select { padding: 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; }
        .date-selector button { padding: 8px 16px; background: #9b87f5; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-delete { background: #f44336; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <a href="1_admin.html" class="back-link" style="display:inline-block;padding:10px 20px;background:#666;color:white;text-decoration:none;border-radius:8px;margin-bottom:20px;">⬅️ 返回接單看板</a>
    
    <div class="card">
        <h2>🗓️ 3.營收明細 (V2)</h2>
        
        <div class="date-selector">
            <label>查詢日期：</label>
            <input type="date" id="date-picker">
            <button onclick="loadReport()">查詢</button>
            <span style="margin-left:10px; color:#888; font-size:13px;">（可查詢近7天）</span>
        </div>

        <div class="sum-box">
            <span class="sum-label">今日實收營收</span>
            <b class="sum-value" id="real">$ 0</b>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>時間</th>
                    <th>桌號</th>
                    <th>金額</th>
                    <th>狀態</th>
                    <th>品項內容</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="report-body">
            </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyByCHTRy2BWrWIqHmOnhUUmL-FgvNskBpQ", 
            authDomain: "bling2-20260416.firebaseapp.com", 
            projectId: "bling2-20260416", 
            databaseURL: "https://bling2-20260416-default-rtdb.asia-southeast1.firebasedatabase.app", 
            appId: "1:923590514580:web:a27bb5b3500034e623a181" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // 設定今天日期
        document.getElementById('date-picker').valueAsDate = new Date();
        
        // 載入7天內的日期
        function loadReport() {
            const selectedDate = document.getElementById('date-picker').value;
            if (!selectedDate) return;
            
            const dateObj = new Date(selectedDate);
            const dateStr = dateObj.toLocaleDateString('zh-TW');
            
            // 檢查是否超過7天
            const now = new Date();
            const diffDays = Math.floor((now - dateObj) / (1000 * 60 * 60 * 24));
            if (diffDays > 7) {
                alert("只能查詢近7天的資料");
                return;
            }

            db.ref('orders_v2').on('value', snap => {
                const tbody = document.getElementById('report-body');
                tbody.innerHTML = '';
                let totalReal = 0;

                snap.forEach(child => {
                    const o = child.val();
                    const id = child.key;
                    const orderDate = new Date(parseInt(o.timestamp || id)).toLocaleDateString('zh-TW');

                    if (orderDate === dateStr) {
                        const isPaid = (o.payStatus === "已結帳");
                        const isFree = (o.payStatus === "免單");

                        // 只有已結帳或免單才計入營收（功能 #9）
                        if (isPaid || isFree) {
                            totalReal += Number(o.totalAmount || 0);
                        }

                        const timeStr = new Date(parseInt(o.timestamp || id)).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                        const itemsStr = (o.items || []).map(i => `${i.name}x${i.count}`).join('、');

                        tbody.innerHTML = `
                            <tr>
                                <td>${timeStr}</td>
                                <td>${o.tableId || '-'}</td>
                                <td>${isFree ? '<span class="tag-free">免單</span>' : '$' + (o.totalAmount || 0)}</td>
                                <td>${isPaid ? '<span class="tag-paid">已結帳</span>' : (isFree ? '<span class="tag-free">免單</span>' : '尚未結帳')}</td>
                                <td>${itemsStr}</td>
                                <td><button class="btn-delete" onclick="deleteOrder('${id}')">🗑 刪除</button></td>
                            </tr>` + tbody.innerHTML;
                    }
                });

                document.getElementById('real').innerText = "$ " + totalReal.toLocaleString();
            });
        }

        // 刪除訂單（功能 #5）
        function deleteOrder(id) {
            if(confirm("確定要刪除這筆訂單嗎？")) {
                db.ref('orders_v2/' + id).remove().then(() => {
                    alert("訂單已刪除");
                });
            }
        }

        // 初始載入
        loadReport();
    </script>
</body>
</html>
