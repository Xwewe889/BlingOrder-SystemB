<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 經營決策中心 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-purple: #9b87f5; --bg-purple: #f5f3ff; --dark-pink: #ff85a2; }
        body { font-family: sans-serif; background: var(--bg-purple); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .val { font-size: 24px; font-weight: bold; color: var(--p-purple); margin-top: 5px; }
        
        .chart-container { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        select { padding: 8px; border-radius: 8px; border: 1px solid var(--p-purple); background: white; color: var(--p-purple); font-weight: bold; cursor: pointer; }
        
        .flex-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .flex-box { grid-template-columns: 1fr; } }
        
        .log-list { max-height: 300px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h2 style="color:var(--p-purple); text-align:center;">💎 BlingOrder 經營決策中心 (紫色重製版)</h2>
    
    <div class="grid">
        <div class="card">本日實收營收<div class="val" id="t-real">$ 0</div></div>
        <div class="card">昨日實收營收<div class="val" id="y-real">$ 0</div></div>
        <div class="card">本月累計實收<div class="val" id="m-real">$ 0</div></div>
        <div class="card">歷史總實收<div class="val" id="all-real">$ 0</div></div>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <h3 style="margin:0; color:#444;">📈 營業額走勢紀錄</h3>
            <select id="trend-range" onchange="updateTrendChart()">
                <option value="7">最近一週</option>
                <option value="30" selected>最近一月</option>
                <option value="90">最近一季</option>
                <option value="365">最近一年</option>
            </select>
        </div>
        <div style="height: 300px;"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="flex-box">
        <div class="chart-container">
            <h3 style="color:#444;">🍎 熱銷品項佔比</h3>
            <canvas id="rankChart"></canvas>
        </div>

        <div class="chart-container">
            <h3 style="color:#444;">🗓️ 每日營收明細</h3>
            <div id="daily-logs" class="log-list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let trendChart, rankChart;
        let globalData = {};

        db.ref('orders_v2').on('value', snap => {
            globalData = snap.val() || {};
            renderDashboard();
        });

        function renderDashboard() {
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW');
            const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString('zh-TW');

            let tReal = 0, yReal = 0, mReal = 0, allReal = 0;
            let itemRank = {}, dailyLog = {};

            Object.values(globalData).forEach(o => {
                const amount = parseInt(o.totalAmount || 0);
                const d = new Date(o.timestamp);
                const dStr = d.toLocaleDateString('zh-TW');
                const isFree = o.payStatus === "免單";

                if(!isFree) {
                    allReal += amount;
                    if(dStr === todayStr) tReal += amount;
                    if(dStr === yesterdayStr) yReal += amount;
                    if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) mReal += amount;
                    dailyLog[dStr] = (dailyLog[dStr] || 0) + amount;

                    if(o.items) {
                        o.items.forEach(i => { itemRank[i.name] = (itemRank[i.name] || 0) + 1; });
                    }
                }
            });

            document.getElementById('t-real').innerText = '$ ' + tReal.toLocaleString();
            document.getElementById('y-real').innerText = '$ ' + yReal.toLocaleString();
            document.getElementById('m-real').innerText = '$ ' + mReal.toLocaleString();
            document.getElementById('all-real').innerText = '$ ' + allReal.toLocaleString();

            updateTrendChart(dailyLog);
            updateRankChart(itemRank);
            
            const logEl = document.getElementById('daily-logs');
            logEl.innerHTML = Object.entries(dailyLog).sort((a,b)=>new Date(b[0])-new Date(a[0])).map(l => 
                `<div class="log-item"><span>${l[0]}</span><b>$ ${l[1].toLocaleString()}</b></div>`
            ).join('');
        }

        function updateTrendChart(dailyData) {
            if(!dailyData) return;
            const range = parseInt(document.getElementById('trend-range').value);
            const labels = [];
            const dataValues = [];
            const avgValues = [];

            for(let i=range-1; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dStr = d.toLocaleDateString('zh-TW');
                labels.push(dStr.split('/')[1] + '/' + dStr.split('/')[2]);
                dataValues.push(dailyData[dStr] || 0);
            }

            // 計算平均值曲線
            const avg = dataValues.reduce((a,b)=>a+b,0) / dataValues.length;
            labels.forEach(() => avgValues.push(avg.toFixed(0)));

            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '每日營業額', data: dataValues, borderColor: '#9b87f5', backgroundColor: 'rgba(155,135,245,0.1)', fill: true, tension: 0.4 },
                        { label: '平均營收線', data: avgValues, borderColor: '#ff85a2', borderDash: [5, 5], fill: false, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateRankChart(itemRank) {
            const sorted = Object.entries(itemRank).sort((a,b)=>b[1]-a[1]).slice(0,6);
            const ctx = document.getElementById('rankChart').getContext('2d');
            if(rankChart) rankChart.destroy();
            rankChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: sorted.map(i=>i[0]),
                    datasets: [{ data: sorted.map(i=>i[1]), backgroundColor: ['#9b87f5','#ff85a2','#ffc107','#4caf50','#2196f3','#9c27b0'] }]
                }
            });
        }
    </script>
</body>
</html>
