<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 專業點餐</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-pink: #fdf2f8; --accent-pink: #db2777; --soft-pink: #fbcfe8; --price-orange: #ff5722; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #f8f8f8; margin: 0; padding-bottom: 80px; }
        
        .header { background: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #eee; }
        .table-info { font-size: 16px; color: var(--accent-pink); font-weight: bold; }

        /* 圖1：九宮格目錄 */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .grid-item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .grid-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; background: #eee; }
        .grid-info { padding: 10px; text-align: center; }
        .grid-info h3 { margin: 0; font-size: 16px; color: #333; height: 44px; overflow: hidden; }
        .grid-info .price { margin-top: 5px; color: var(--price-orange); font-weight: bold; font-size: 18px; }

        /* 圖2：詳情頁彈窗 (全螢幕) */
        #detailPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; overflow-y: auto; }
        .detail-header { position: relative; width: 100%; }
        .close-btn { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 10; border: 1px solid #ddd; }
        .detail-img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: #f0f0f0; }
        .detail-content { padding: 20px; }
        .detail-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .detail-price { font-size: 24px; color: var(--price-orange); font-weight: bold; margin-bottom: 20px; }
        
        .option-group { margin-bottom: 20px; }
        .option-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #555; background: #f5f5f5; padding: 5px 10px; border-radius: 4px; }
        .option-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .option-item input { width: 20px; height: 20px; accent-color: var(--price-orange); }

        /* 詳情頁底部按鈕 */
        .detail-footer { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .qty-ctrl { display: flex; align-items: center; gap: 15px; font-size: 20px; font-weight: bold; }
        .qty-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 20px; cursor: pointer; }
        .add-cart-btn { flex-grow: 1; background: var(--price-orange); color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 懸浮購物車(圖1顯示) */
        .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--accent-pink); color: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: bold; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: var(--accent-pink);">💎 BlingOrder</h2>
        <div id="displayTable" class="table-info">載入桌號中...</div>
    </div>
    <div id="menuGrid" class="menu-grid"></div>
    <div class="cart-float" onclick="submitOrder()">🛒 送出訂單 (<span id="cartCount">0</span>)</div>

    <div id="detailPage">
        <div class="detail-header">
            <div class="close-btn" onclick="closeDetail()">✕</div>
            <img id="dImg" class="detail-img" src="">
        </div>
        <div class="detail-content">
            <div id="dTitle" class="detail-title">品項名稱</div>
            <div id="dNote" style="color:#888; font-size:14px; margin-bottom:10px;">*備註說明</div>
            <div id="dPrice" class="detail-price">$0</div>

            <div class="option-group">
                <div class="option-title">加料更美味 (可多選)</div>
                <div class="option-item" onclick="toggleCheckbox('opt-egg')">
                    <span>加蛋 (+$15)</span>
                    <input type="checkbox" id="opt-egg" data-p="15">
                </div>
                <div class="option-item" onclick="toggleCheckbox('opt-cheese')">
                    <span>加起司 (+$10)</span>
                    <input type="checkbox" id="opt-cheese" data-p="10">
                </div>
            </div>
        </div>
        <div class="detail-footer">
            <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="dQty">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="add-cart-btn" onclick="confirmAddToCart()">加入購物車 • $<span id="dSubtotal">0</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://blingorder-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let tableNum = urlParams.get('table') || "未知";
        document.getElementById('displayTable').innerText = (tableNum === "7") ? "💎 包廂" : tableNum + " 號桌";

        let cart = [];
        let currentItem = null;
        let currentQty = 1;

        // 讀取菜單並渲染九宮格
        function loadMenu() {
            db.ref('menu').on('value', (snapshot) => {
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';
                snapshot.forEach((child) => {
                    const item = child.val();
                    const id = child.key;
                    grid.innerHTML += `
                        <div class="grid-item" onclick='openDetail(${JSON.stringify({...item, id})})'>
                            <img src="${item.image || 'https://placehold.co/200x200'}" class="grid-img">
                            <div class="grid-info">
                                <h3>${item.name}</h3>
                                <div class="price">$${item.price}</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // 開啟詳情頁 (圖2)
        function openDetail(item) {
            currentItem = item;
            currentQty = 1;
            document.getElementById('dImg').src = item.image || '';
            document.getElementById('dTitle').innerText = item.name;
            document.getElementById('dNote').innerText = item.note || '';
            document.getElementById('dPrice').innerText = `$${item.price}`;
            document.getElementById('dQty').innerText = currentQty;
            
            // 重置選項
            document.getElementById('opt-egg').checked = false;
            document.getElementById('opt-cheese').checked = false;
            
            updateSubtotal();
            document.getElementById('detailPage').style.display = 'block';
        }

        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }

        function toggleCheckbox(id) {
            const cb = document.getElementById(id);
            cb.checked = !cb.checked;
            updateSubtotal();
        }

        function changeQty(n) {
            currentQty = Math.max(1, currentQty + n);
            document.getElementById('dQty').innerText = currentQty;
            updateSubtotal();
        }

        function updateSubtotal() {
            let base = currentItem.price;
            if(document.getElementById('opt-egg').checked) base += 15;
            if(document.getElementById('opt-cheese').checked) base += 10;
            document.getElementById('dSubtotal').innerText = base * currentQty;
        }

        function confirmAddToCart() {
            let addons = [];
            let addonPrice = 0;
            if(document.getElementById('opt-egg').checked) { addons.push("加蛋"); addonPrice += 15; }
            if(document.getElementById('opt-cheese').checked) { addons.push("加起司"); addonPrice += 10; }

            const finalPrice = currentItem.price + addonPrice;
            const finalName = currentItem.name + (addons.length > 0 ? `(${addons.join(',')})` : '');

            for(let i=0; i<currentQty; i++) {
                cart.push({ id: currentItem.id, name: finalName, price: finalPrice });
            }
            
            document.getElementById('cartCount').innerText = cart.length;
            closeDetail();
            alert('已加入購物車！');
        }

        function submitOrder() {
            if (cart.length === 0) return alert('請先點餐！');
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            const orderData = {
                table: tableNum,
                items: cart,
                totalPrice: total,
                status: "待處理",
                payStatus: "尚未結帳",
                timestamp: Date.now()
            };
            db.ref('orders').push(orderData).then(() => {
                alert('訂單已送出！');
                cart = [];
                document.getElementById('cartCount').innerText = 0;
            });
        }

        loadMenu();
    </script>
</body>
</html>
