<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 九宮格分類版</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-pink: #fdf2f8; --accent-pink: #db2777; --price-orange: #ff5722; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #f9f9f9; margin: 0; padding-bottom: 80px; }
        
        .header { background: white; padding: 10px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        
        /* 1. 分類導覽列 */
        .category-bar { background: white; padding: 10px; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; border-bottom: 1px solid #eee; position: sticky; top: 60px; z-index: 90; }
        .cat-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 14px; border: none; cursor: pointer; color: #666; }
        .cat-btn.active { background: var(--accent-pink); color: white; font-weight: bold; }

        /* 九宮格 */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .grid-item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .grid-info { padding: 8px; text-align: center; }
        .grid-info h3 { margin: 0; font-size: 15px; color: #333; height: 40px; }
        .grid-info .price { color: var(--price-orange); font-weight: bold; margin-top: 5px; }

        /* 詳情頁詳情 */
        #detailPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; left: 15px; width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; z-index: 10; font-size: 20px; }
        .detail-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .detail-body { padding: 20px; }
        
        .opt-box { margin-top: 20px; border-top: 1px solid #eee; }
        .opt-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .opt-item input { width: 18px; height: 18px; accent-color: var(--price-orange); }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 15px; display: flex; align-items: center; box-sizing: border-box; z-index: 100; }
        .add-btn { flex-grow: 1; background: var(--price-orange); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; }
        .qty-area { display: flex; align-items: center; gap: 15px; margin-right: 15px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h3 style="margin:0; color: var(--accent-pink);">💎 BlingOrder</h3><div id="displayTable"></div></div>
    <div id="catBar" class="category-bar"></div>
    <div id="menuGrid" class="menu-grid"></div>
    
    <div id="detailPage">
        <div class="close-btn" onclick="closeDetail()">✕</div>
        <img id="dImg" class="detail-img">
        <div class="detail-body">
            <h2 id="dTitle" style="margin:0"></h2>
            <div id="dPrice" style="color:var(--price-orange); font-size:22px; font-weight:bold; margin:10px 0;"></div>
            <div id="optContainer" class="opt-box"></div>
        </div>
        <div class="footer">
            <div class="qty-area">
                <button style="width:30px;height:30px;border-radius:50%;border:1px solid #ccc;" onclick="changeQty(-1)">-</button>
                <span id="dQty">1</span>
                <button style="width:30px;height:30px;border-radius:50%;border:1px solid #ccc;" onclick="changeQty(1)">+</button>
            </div>
            <button class="add-btn" onclick="addToCart()">加入購物車 • $<span id="dTotal">0</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://blingorder-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tableNum = new URLSearchParams(window.location.search).get('table') || "未知";
        document.getElementById('displayTable').innerText = (tableNum==="7"?"💎包廂":tableNum+"號桌");

        let allMenu = [];
        let currentCat = "全部";
        let curItem = null, curQty = 1, cart = [];

        db.ref('menu').on('value', snap => {
            allMenu = [];
            snap.forEach(c => allMenu.push({...c.val(), id: c.key}));
            renderCats();
            renderGrid();
        });

        function renderCats() {
            const cats = ["全部", ...new Set(allMenu.map(i => i.category))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat===c?'active':''}" onclick="filterCat('${c}')">${c}</button>
            `).join('');
        }

        function filterCat(c) { currentCat = c; renderCats(); renderGrid(); }

        function renderGrid() {
            const filtered = currentCat === "全部" ? allMenu : allMenu.filter(i => i.category === currentCat);
            document.getElementById('menuGrid').innerHTML = filtered.map(i => `
                <div class="grid-item" onclick='openDetail(${JSON.stringify(i)})'>
                    <img src="${i.image}" class="grid-img">
                    <div class="grid-info"><h3>${i.name}</h3><div class="price">$${i.price}</div></div>
                </div>
            `).join('');
        }

        function openDetail(item) {
            curItem = item; curQty = 1;
            document.getElementById('dImg').src = item.image;
            document.getElementById('dTitle').innerText = item.name;
            document.getElementById('dPrice').innerText = `$${item.price}`;
            document.getElementById('dQty').innerText = 1;
            
            // 渲染選項
            let optHtml = '';
            if(item.opts) {
                for(let key in item.opts) {
                    if(item.opts[key]) {
                        const p = (key==="深微醺") ? 40 : 0;
                        optHtml += `<div class="opt-item" onclick="toggleOpt('${key}')">
                            <span>${key} ${p>0?'+$'+p:''}</span>
                            <input type="checkbox" id="cb-${key}" data-p="${p}">
                        </div>`;
                    }
                }
            }
            document.getElementById('optContainer').innerHTML = optHtml;
            updateTotal();
            document.getElementById('detailPage').style.display = 'block';
        }

        function toggleOpt(id) { const cb = document.getElementById('cb-'+id); cb.checked = !cb.checked; updateTotal(); }
        function changeQty(n) { curQty = Math.max(1, curQty + n); document.getElementById('dQty').innerText = curQty; updateTotal(); }
        function updateTotal() {
            let p = curItem.price;
            document.querySelectorAll('#optContainer input:checked').forEach(cb => p += parseInt(cb.dataset.p || 0));
            document.getElementById('dTotal').innerText = p * curQty;
        }

        function addToCart() {
            let opts = [];
            let p = curItem.price;
            document.querySelectorAll('#optContainer input:checked').forEach(cb => {
                const name = cb.id.replace('cb-','');
                opts.push(name);
                p += parseInt(cb.dataset.p);
            });
            const name = curItem.name + (opts.length?`(${opts.join(',')})`:'');
            for(let i=0; i<curQty; i++) cart.push({id: curItem.id, name: name, price: p});
            alert('已加入！目前共 '+cart.length+' 份');
            closeDetail();
        }

        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
        
        // 點擊頂部標題送出訂單 (方便測試)
        function submitOrder() {
            if(!cart.length) return;
            db.ref('orders').push({table:tableNum, items:cart, totalPrice: cart.reduce((s,i)=>s+i.price,0), status:"待處理", timestamp:Date.now()});
            alert('訂單已送出'); cart = [];
        }
        document.querySelector('.header').onclick = submitOrder;
    </script>
</body>
</html>
