<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布拎布拎喫茶店 - 線上點餐 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff0f5; margin: 0; padding: 20px; }
        .header { text-align: center; color: #ff69b4; font-size: 24px; margin-bottom: 20px; font-weight: bold; }
        .category-title { background: #ffe4e1; padding: 5px 15px; border-radius: 20px; color: #d02090; display: inline-block; margin-top: 15px; font-size: 14px; }
        .item-card { background: white; border-radius: 12px; padding: 12px; margin-top: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-card img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 16px; color: #333; }
        .item-price { color: #ff69b4; font-size: 15px; margin-top: 4px; }
        .loading { text-align: center; color: #aaa; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">布拎布拎喫茶店</div>
<div id="menuContainer">
    <p class="loading">美味餐點準備中...</p>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
        authDomain: "blingorder.firebaseapp.com", 
        projectId: "blingorder", 
        databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
        storageBucket: "blingorder.firebasestorage.app", 
        appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 讀取 V2 Beta 資料夾
    database.ref('menu_v2_beta').on('value', (snapshot) => {
        const menuContainer = document.getElementById('menuContainer');
        menuContainer.innerHTML = "";
        const data = snapshot.val();
        
        if (!data) {
            menuContainer.innerHTML = "<p style='text-align:center'>目前暫無供應餐點</p>";
            return;
        }

        // 依類別分組
        const categories = {};
        Object.keys(data).forEach(key => {
            const item = data[key];
            // 只顯示「在售」的商品
            if (item.status !== "售完") {
                const cat = item.category || "精選推薦";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            }
        });

        // 產生 HTML
        Object.keys(categories).forEach(catName => {
            let catHtml = `<div class="category-title">✿ ${catName}</div>`;
            categories[catName].forEach(item => {
                catHtml += `
                    <div class="item-card">
                        <img src="${item.image}">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">$${item.price}</div>
                        </div>
                    </div>
                `;
            });
            menuContainer.innerHTML += catHtml;
        });
    });
</script>
</body>
</html>
