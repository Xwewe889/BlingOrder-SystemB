<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布拎布拎喫茶店 - 線上點餐 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fff0f5; margin: 0; padding: 20px; padding-bottom: 100px; }
        .header { text-align: center; color: #ff69b4; font-size: 26px; margin-bottom: 25px; font-weight: bold; letter-spacing: 2px; }
        .category-group { margin-bottom: 25px; }
        .category-title { background: #ffe4e1; padding: 8px 20px; border-radius: 25px; color: #d02090; display: inline-block; margin-bottom: 15px; font-size: 15px; font-weight: bold; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 3px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .item-card img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 17px; color: #444; }
        .item-price { color: #ff69b4; font-size: 16px; margin-top: 6px; font-weight: bold; }

        /* 彈窗 UI */
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; position: relative; overflow: hidden; }
        .close-btn { position: absolute; top: 15px; left: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 10; }
        .add-cart-btn { width: 100%; padding: 15px; background: #ff69b4; color: white; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 購物車條 */
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #ff85c0; padding: 15px 25px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; box-shadow: 0 5px 15px rgba(255,133,192,0.4); z-index: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">布拎布拎喫茶店</div>
<div id="menuContainer"></div>

<div id="detailModal">
    <div class="modal-content">
        <div class="close-btn" onclick="document.getElementById('detailModal').style.display='none'">✕</div>
        <img id="modalImg" style="width:100%; height:250px; object-fit:cover;">
        <div style="padding:20px;">
            <h2 id="modalName" style="margin:0;"></h2>
            <p id="modalDesc" style="color:#777; font-size:14px; margin-top:10px;"></p>
            <div id="modalPrice" style="color:#ff69b4; font-size:22px; font-weight:bold; margin-top:15px;"></div>
            <button class="add-cart-btn" onclick="addToCart()">加入購物車</button>
        </div>
    </div>
</div>

<div class="cart-bar" id="cartBar" style="display: none;" onclick="sendOrder()">
    <div>🛒 已選 <span id="cartCount">0</span> 份餐點</div>
    <div>確認送出訂單 ></div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ", 
        authDomain: "blingorder.firebaseapp.com", 
        projectId: "blingorder", 
        databaseURL: "https://blingorder-default-rtdb.firebaseio.com", 
        storageBucket: "blingorder.firebasestorage.app", 
        appId: "1:798993901664:web:9c2023b419ae099fe9fb05" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cart = [];
    let selectedItem = null;
    const tableNum = new URLSearchParams(window.location.search).get('table') || "外帶";

    database.ref('menu_v2_beta').on('value', (snapshot) => {
        const container = document.getElementById('menuContainer');
        container.innerHTML = "";
        const data = snapshot.val();
        if (!data) return;

        const categories = {};
        Object.keys(data).forEach(key => {
            const item = data[key];
            if (item.status !== "售完") {
                const cat = item.category || "精選推薦";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            }
        });

        Object.keys(categories).forEach(catName => {
            let html = `<div class="category-group"><div class="category-title">✿ ${catName}</div>`;
            categories[catName].forEach(item => {
                html += `
                    <div class="item-card" onclick="openDetail('${item.name}', '${item.image}', '${item.price}', '${item.description || ''}')">
                        <img src="${item.image}">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">$${item.price}</div>
                        </div>
                    </div>`;
            });
            container.innerHTML += html + `</div>`;
        });
    });

    function openDetail(name, img, price, desc) {
        selectedItem = { name, price };
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalImg').src = img;
        document.getElementById('modalPrice').innerText = '$' + price;
        document.getElementById('modalDesc').innerText = desc;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function addToCart() {
        cart.push({ name: selectedItem.name, price: parseInt(selectedItem.price), count: 1 });
        document.getElementById('cartBar').style.display = 'flex';
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('detailModal').style.display = 'none';
    }

    function sendOrder() {
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        database.ref('orders').push({
            table: tableNum,
            items: cart,
            total: total,
            status: "未處理",
            time: new Date().toLocaleString()
        }).then(() => {
            alert("訂單已送出！");
            cart = [];
            document.getElementById('cartBar').style.display = 'none';
        });
    }
</script>
</body>
</html>
