<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 營收報表明細 (原始數據)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff; padding: 20px; }
        .card { border: 2px solid #ffafbd; padding: 20px; border-radius: 10px; }
        h2 { color: #e91e63; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f8f8; padding: 10px; border: 1px solid #ddd; text-align: left; }
        td { padding: 10px; border: 1px solid #ddd; font-size: 13px; }
        .btn-del { background: #ff5f6d; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; }
        .status-bar { margin-bottom: 20px; padding: 10px; background: #fff5f7; border-radius: 5px; border-left: 5px solid #ffafbd; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌸 BlingOrder 報表偵錯模式</h2>
        <div class="status-bar">
            今日總計：<b id="day-sum">$0</b> | 總訂單數：<b id="order-count">0</b>
            <p style="font-size: 0.8rem; color: #666;">* 如果今天沒營業卻有錢，請直接點擊下方的「刪除」清理測試單。</p>
        </div>
        <table>
            <thead><tr><th>時間 (Timestamp)</th><th>桌號</th><th>總金額</th><th>原始品項內容</th><th>操作</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('report-body');
            tbody.innerHTML = '';
            let totalToday = 0; let count = 0;
            const todayStr = new Date().toLocaleDateString('zh-TW');

            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const order = data[key];
                    const date = new Date(order.timestamp || 0);
                    const dateStr = date.toLocaleDateString('zh-TW');
                    
                    // 金額讀取
                    const amount = parseInt(order.totalAmount || order.totalPrice || 0);
                    if (dateStr === todayStr) totalToday += amount;
                    count++;

                    // 品項處理
                    let itemsStr = "";
                    if (Array.isArray(order.items)) {
                        itemsStr = order.items.map(i => `${i.name || '未命名'} x${i.quantity || 1}`).join('、');
                    } else { itemsStr = "資料格式錯誤"; }

                    tbody.innerHTML += `<tr>
                        <td>${date.toLocaleString()}</td>
                        <td>${order.tableId || '無'}</td>
                        <td>$${amount}</td>
                        <td>${itemsStr}</td>
                        <td><button class="btn-del" onclick="deleteOrder('${key}')">永久刪除此單</button></td>
                    </tr>`;
                });
            }
            document.getElementById('day-sum').innerText = '$' + totalToday;
            document.getElementById('order-count').innerText = count;
        });

        function deleteOrder(key) { if (confirm('確定要刪除這筆資料嗎？刪除後數據會即時更新。')) db.ref('orders/' + key).remove(); }
    </script>
</body>
</html>
