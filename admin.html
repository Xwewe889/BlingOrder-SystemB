<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 接單看板 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0ebff; padding: 20px; }
        .order-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 10px solid #9b87f5; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-pay { background: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-free { background: #9b87f5; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <h2 style="color:#6a5acd">💎 BlingOrder 收單中心 V2</h2>
    <div id="orders-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders_v2').on('value', snap => {
            const orders = snap.val() || {};
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            Object.keys(orders).reverse().forEach(id => {
                const o = orders[id];
                if(o.payStatus === "尚未結帳") {
                    list.innerHTML += `
                        <div class="order-card">
                            <div style="font-size:24px; font-weight:bold; color:#6a5acd">桌號：${o.tableId}</div>
                            <div style="margin:10px 0; padding:10px; background:#f8f7ff; border-radius:5px;">
                                ${o.items.map(i => i.name+' x1').join('<br>')}
                            </div>
                            <div style="font-size:18px; margin-bottom:15px;">總計：<b>$${o.totalAmount}</b></div>
                            <button class="btn-pay" onclick="setPay('${id}', '已結帳')">結帳完成</button>
                            <button class="btn-free" onclick="setPay('${id}', '免單')">✨ 免單招待</button>
                        </div>
                    `;
                }
            });
        });

        function setPay(id, status) {
            db.ref('orders_v2/'+id).update({ payStatus: status });
        }
    </script>
</body>
</html>
