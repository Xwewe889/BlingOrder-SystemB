<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 接單看板 V2.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 10px solid #ff85a2; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-group { font-size: 12px; color: #9b87f5; font-weight: bold; margin-top: 5px; border-bottom: 1px dashed #eee; padding-bottom: 3px; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .btn-pay { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-free { background: #9b87f5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <h2 style="color:#ff85a2">🌸 接單中 (已啟用自動類別排序)</h2>
    <div id="order-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 類別排序權重 (數字越小越前面)
        const categoryOrder = { "飲品": 1, "炸物": 2, "昭和小食": 3, "甜點": 4, "其他": 5 };

        db.ref('orders_v2').on('value', snap => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.payStatus === "尚未結帳") {
                    // 這裡執行類別排序
                    const sortedItems = [...o.items].sort((a, b) => {
                        return (categoryOrder[a.category] || 99) - (categoryOrder[b.category] || 99);
                    });

                    list.innerHTML += `
                        <div class="order-card">
                            <div style="font-size:28px; font-weight:bold; color:#ff85a2">桌號：${o.tableId}</div>
                            <div style="margin:15px 0;">
                                ${sortedItems.map(i => `
                                    <div class="item-row">
                                        <span><small>[${i.category || '未分類'}]</small> <b>${i.name}</b></span>
                                        <span>x1</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="text-align:right; margin-top:15px;">
                                <button class="btn-pay" onclick="updateStatus('${child.key}', '已結帳')">結帳 $${o.totalAmount}</button>
                                <button class="btn-free" onclick="updateStatus('${child.key}', '免單')">✨ 免單</button>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function updateStatus(key, status) {
            db.ref('orders_v2/'+key).update({ payStatus: status });
        }
    </script>
</body>
</html>
