<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 接單看板 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 10px solid #ff85a2; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .table-no { font-size: 32px; font-weight: bold; color: #ff85a2; border-bottom: 2px solid #fff0f3; margin-bottom: 10px; }
        .item-list { margin: 10px 0; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #fce7f3; }
        .cat-tag { font-size: 10px; color: #9b87f5; background: #f8f7ff; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        button { border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-pay { background: #4CAF50; color: white; }
        .btn-free { background: #9b87f5; color: white; }
    </style>
</head>
<body>
    <h2 style="color:#ff85a2; text-align:center;">🌸 BlingOrder 接單中心 (類別排序版)</h2>
    <div id="order-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 定義排序權重
        const catWeight = { "飲品": 1, "炸物": 2, "昭和小食": 3, "甜點": 4, "其他": 5 };

        db.ref('orders_v2').on('value', snap => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.payStatus === "尚未結帳") {
                    // 對訂單內項目進行排序
                    const sortedItems = [...(o.items || [])].sort((a, b) => {
                        return (catWeight[a.category] || 99) - (catWeight[b.category] || 99);
                    });

                    list.innerHTML += `
                        <div class="order-card">
                            <div class="table-no">桌號：${o.tableId}</div>
                            <div class="item-list">
                                ${sortedItems.map(i => `
                                    <div class="item-row">
                                        <span><span class="cat-tag">${i.category || '一般'}</span> <b>${i.name}</b></span>
                                        <span>x1</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="font-size:18px; text-align:right; margin-top:10px;">總計：<b>$${o.totalAmount}</b></div>
                            <div class="btn-group">
                                <button class="btn-pay" onclick="updatePay('${child.key}', '已結帳')">一般結帳</button>
                                <button class="btn-free" onclick="updatePay('${child.key}', '免單')">✨ 免單招待</button>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function updatePay(key, status) {
            db.ref('orders_v2/'+key).update({ payStatus: status });
        }
    </script>
</body>
</html>
