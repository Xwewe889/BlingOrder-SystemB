<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 接單看板 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 10px solid #ff85a2; display: flex; justify-content: space-between; align-items: center; }
        .btn-group button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-pay { background: #4CAF50; color: white; }
        .btn-free { background: #9b87f5; color: white; }
    </style>
</head>
<body>
    <h2 style="color:#ff85a2">🌸 BlingOrder 接單看板 (V2)</h2>
    <div id="order-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTeLTAX-F5i3WHKYY0ITZsla0Qgs5e2zQ",
            authDomain: "blingorder.firebaseapp.com",
            projectId: "blingorder",
            databaseURL: "https://blingorder-default-rtdb.firebaseio.com",
            appId: "1:798993901664:web:9c2023b419ae099fe9fb05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders_v2').on('value', snap => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.payStatus === "尚未結帳") {
                    list.innerHTML += `
                        <div class="order-card">
                            <div>
                                <div style="font-size:24px; font-weight:bold;">桌號：${o.tableId}</div>
                                <div style="color:#888;">${o.items.map(i => i.name).join('、')}</div>
                                <div style="font-size:18px; color:#ff85a2;">$${o.totalAmount}</div>
                            </div>
                            <div class="btn-group">
                                <button class="btn-pay" onclick="updateStatus('${child.key}', '已結帳')">結帳</button>
                                <button class="btn-free" onclick="updateStatus('${child.key}', '免單')">免單</button>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function updateStatus(key, status) {
            db.ref('orders_v2/'+key).update({ payStatus: status });
        }
    </script>
</body>
</html>
