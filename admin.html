<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingOrder | 接單看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .order-card { background: #ffffff; color: #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; align-items: flex-start; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .table-no { font-size: 40px; font-weight: bold; min-width: 120px; color: #db2777; border-right: 2px solid #eee; margin-right: 20px; }
        .order-content { flex-grow: 1; font-size: 26px; font-weight: 700; line-height: 1.4; color: #000; }
        .item-row { margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .qty-tag { color: #db2777; font-size: 30px; margin-left: 10px; }
        .cat-tag { font-size: 14px; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; color: #666; margin-right: 8px; vertical-align: middle; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; min-width: 180px; margin-left: 20px; }
        button { font-size: 22px; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-pay { background: #fbbf24; color: #000; }
        .btn-pay.done { background: #d1d5db; color: #999; cursor: not-allowed; }
        .btn-ship { background: #10b981; color: white; }
        /* 門簾樣式 */
        #curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; display: flex; justify-content: center; align-items: center; }
        .curtain-btn { padding: 40px 80px; font-size: 40px; background: #db2777; color: white; border-radius: 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="curtain"><button class="curtain-btn" onclick="startSystem()">點擊啟動接單系統</button></div>
    
    <div class="header">
        <h1 style="color:#fbcfe8">💎 BlingOrder 接單看板</h1>
        <div id="totalSales" style="font-size: 30px; background: #333; padding: 10px 20px; border-radius: 10px;">今日：$0</div>
    </div>

    <div id="orderBoard"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://blingorder-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let menuData = {};

        // 先讀取菜單資訊(包含簡稱與類別)
        db.ref('menu').on('value', (snapshot) => { menuData = snapshot.val() || {}; });

        function startSystem() {
            document.getElementById('curtain').style.display = 'none';
            loadOrders();
        }

        function loadOrders() {
            db.ref('orders').orderByChild('status').equalTo('待處理').on('value', (snapshot) => {
                const board = document.getElementById('orderBoard');
                board.innerHTML = '';
                let dailyTotal = 0;

                snapshot.forEach((orderSnap) => {
                    const order = orderSnap.val();
                    const orderId = orderSnap.key;
                    
                    // 1. 處理品項合併與分類排序
                    let itemsMap = {};
                    order.items.forEach(item => {
                        // 優先使用簡稱，沒有就用原名
                        const displayName = menuData[item.id]?.short_name || item.name;
                        const category = menuData[item.id]?.category || 'Z'; // 未分類排最後
                        
                        if (!itemsMap[item.id]) {
                            itemsMap[item.id] = { name: displayName, qty: 0, cat: category };
                        }
                        itemsMap[item.id].qty++;
                    });

                    // 轉為陣列並按類別 A, B, C... 排序
                    const sortedItems = Object.values(itemsMap).sort((a, b) => a.cat.localeCompare(b.cat));

                    // 2. 建立訂單卡片 HTML
                    let itemsHtml = sortedItems.map(i => `
                        <div class="item-row">
                            <span class="cat-tag">${i.cat}</span>${i.name} <span class="qty-tag">× ${i.qty}</span>
                        </div>
                    `).join('');

                    board.innerHTML += `
                        <div class="order-card">
                            <div class="table-no">${order.table === "7" ? "💎包廂" : order.table + "桌"}</div>
                            <div class="order-content">${itemsHtml}</div>
                            <div class="btn-group">
                                <button class="btn-pay ${order.payStatus === '已結帳' ? 'done' : ''}" 
                                        onclick="markPaid('${orderId}')" ${order.payStatus === '已結帳' ? 'disabled' : ''}>
                                    ${order.payStatus === '已結帳' ? '已結帳' : '尚未結帳'}
                                </button>
                                <button class="btn-ship" onclick="markShipped('${orderId}')">已出餐</button>
                            </div>
                        </div>
                    `;
                    dailyTotal += order.totalPrice;
                });
                document.getElementById('totalSales').innerText = `今日：$${dailyTotal}`;
            });
        }

        function markPaid(id) { db.ref('orders/' + id).update({ payStatus: '已結帳' }); }
        function markShipped(id) { db.ref('orders/' + id).update({ status: '已完成' }); }
    </script>
</body>
</html>
